# Example: Simple Maven Application with Container
artifacts:
  - name: my-app
    project-type: maven
    working-directory: .
    build-type: application
    # sboms: all          # default; valid values: all | none | build | analyzed-artifact | analyzed-container | comma-list
    # sboms: build        # uncomment for compliance-minimum (CISA Build SBOM only, no syft scans)
    config:
      java-version: 25
containers:
  - name: my-app
    from: [my-app]
    container-file: Containerfile
    context: .
    platforms: linux/amd64,linux/arm64
    enable-slsa: true
    enable-scan: true
    # Container SBOM (analyzed-container) scan is derived from each source
    # artefact's `sboms`. With `sboms: all` (default) on the source, the
    # container is scanned. To skip: set source `sboms: build,analyzed-artifact`.
