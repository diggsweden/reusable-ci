# Example: Gradle JVM library (publishes to Maven Central).
#
# For Android applications, see examples/android-app/ — that path uses
# `project-type: gradle-android` and routes to build-gradle-android.yml,
# which understands product flavors, AABs, and Google Play publishing.
artifacts:
  - name: my-gradle-app
    project-type: gradle
    working-directory: .
    build-type: library
    publish-to:
      - maven-central
    config:
      java-version: 25
      gradle-tasks: build publish
      gradle-version-file: gradle.properties
      # setup-android: true  # Uncomment for Android library projects (produces .aar)

