# Description:
# This workflow runs OpenSSF Scorecard to analyze your repository for security best practices.
# It uploads the results as artifacts and integrates with GitHub's code scanning dashboard.
#
# How to use:
# 1. Add the following to your workflow file:
#    jobs:
#      scorecard-analysis:
#        uses: <orgname>/<reponame>/.github/workflows/<workflowname>.yml@72b9c326139080c9a9c91999ada2d62d19e7ee54 # v2.7.0
#        with:
#          cron-schedule: "30 1 * * 6" # Optional, default is "30 1 * * 5" (weekly on Fridays at 01:30 UTC)
#          publish-results: true # Optional, default is true
#
# 2. The results will be available as artifacts and in the GitHub Code Scanning dashboard.
#
# Note: This workflow is repository-general. The reusable-ci-ref input is only
#       used for the SARIF upload script checkout.
name: Analyze OpenSSF Scorecard
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      cron-schedule:
        description: "Cron schedule for the workflow (default: '30 1 * * 5' - weekly on Fridays at 01:30 UTC)"
        required: false
        default: "30 1 * * 5"
        type: string
      publish-results:
        description: "Whether to publish the results to the OpenSSF Scorecard API (default: true)"
        required: false
        default: true
        type: boolean
      egress-policy:
        description: "Egress policy for the Harden Runner step (e.g., audit, block)"
        required: false
        default: "audit"
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Needed for GitHub OIDC token if publish_results is true
      id-token: write
    # Note: scorecard-action's publish webapp forbids job-level env vars
    # (see https://github.com/ossf/scorecard-action#workflow-restrictions).
    # SARIF_UPLOAD_TOKEN is declared at step level on the upload step below.
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ inputs.publish-results }}
      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Save scorecard SARIF artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: sarif-scorecard
          path: results.sarif
          retention-days: 5
      - name: Checkout reusable-ci scripts
        if: success() || failure()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Upload scorecard results to Code Scanning
        if: success() || failure()
        env:
          SARIF_UPLOAD_TOKEN: ${{ secrets.SARIF_UPLOAD_TOKEN }}
          SARIF_FILE: results.sarif
          SARIF_CATEGORY: scorecard
        run: bash .github-shared/scripts/security/upload-sarif.sh
