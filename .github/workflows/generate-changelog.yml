#
# Generate Changelog
# 
# This reusable workflow generates a changelog using git-cliff with flexible configuration.
# Can generate full history, latest changes only, with or without headers.
#
# Common use cases:
#   - Full history: gitCliffArgs="" 
#   - Latest release: gitCliffArgs="--latest"
#   - Commit message: gitCliffArgs="--latest --strip header"
name: Generate Changelog
on:
  workflow_call:
    inputs:
      branch:
        description: "Branch to generate changelog from"
        required: false
        default: "main"
        type: string
      changelog-config:
        description: "Path to git-cliff configuration file"
        required: false
        default: ".github-templates/templates/gitcliff/default.toml"
        type: string
      git-cliff-args:
        description: "Arguments for git-cliff (empty for full, '--latest' for latest release)"
        required: false
        default: ""
        type: string
      output-file:
        description: "Output filename"
        required: false
        default: "ReleasenotesTmp"
        type: string
      upload-as-artifact:
        description: "Upload as artifact (true) or keep in workspace (false)"
        required: false
        default: true
        type: boolean
      artifact-name:
        description: "Artifact name if uploading"
        required: false
        default: "release-changelog"
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci templates checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  generate-changelog:
    name: Generate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0 # Need full history for git-cliff
      - name: Fetch git-cliff templates
        if: ${{ startsWith(inputs['changelog-config'], '.github-templates/') }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          path: .github-templates
          ref: ${{ inputs['reusable-ci-ref'] }}
          sparse-checkout: |
            templates/
      - name: Generate Changelog with git-cliff
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: ${{ inputs['changelog-config'] }}
          args: ${{ inputs['git-cliff-args'] }}
        env:
          OUTPUT: ${{ inputs['output-file'] }}
          GITHUB_REPO: ${{ github.repository }}
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Verify Changelog Generation
        env:
          CHANGELOG_FILE: ${{ inputs['output-file'] }}
        run: bash "${{ github.workspace }}/.github-shared/scripts/release/validate-changelog.sh"
      - name: Upload Changelog Artifact
        if: ${{ inputs['upload-as-artifact'] }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs['artifact-name'] }}
          path: ${{ inputs['output-file'] }}
          retention-days: 7
