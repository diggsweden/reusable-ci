# Rust Builder (minimal)
#
# Generates a CycloneDX Build SBOM (bom.json) and uploads it as an artifact.
#
name: Build Rust
on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: "Rust toolchain version (e.g., 1.90, stable)"
        required: true
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      branch:
        description: "Branch to checkout"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  build-rust:
    name: Build Rust Project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
      - name: Install Rust toolchain
        env:
          TOOLCHAIN: ${{ inputs['rust-toolchain'] }}
        run: |
          rustup toolchain install "$TOOLCHAIN" --profile minimal
          rustup default "$TOOLCHAIN"
      - name: Generate Build SBOM
        working-directory: ${{ inputs['working-directory'] }}
        env:
          # renovate: datasource=crate depName=cargo-cyclonedx
          CARGO_CYCLONEDX_VERSION: "0.5.9"
        run: |
          cargo install --locked cargo-cyclonedx --version "${CARGO_CYCLONEDX_VERSION}"
          cargo cyclonedx --format json --override-filename bom
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: rust-build-artifacts
          path: ${{ inputs['working-directory'] }}/bom.json
          retention-days: 7
          if-no-files-found: error
