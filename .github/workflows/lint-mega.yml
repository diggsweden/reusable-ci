# Description:
# This workflow runs MegaLinter to analyze your codebase for linting, security, and formatting issues.
# It uploads the results as artifacts and integrates with GitHub Code Scanning.
#
# How to use:
# 1. Add the following to your workflow file:
#    jobs:
#      mega-linter:
#        uses: <orgname>/<reponame>/.github/workflows/<workflowname>.yml@72b9c326139080c9a9c91999ada2d62d19e7ee54 # v2.7.0
#        with:
#          megalinter-config: "path/to/your/megalinter.yml" # Optional
#
# 2. Ensure your repository has a MegaLinter configuration file (e.g., `.mega-linter.yml`).
#    If not, MegaLinter will use its default configuration.
#
# 3. The results will be available as artifacts and in GitHub Code Scanning.
name: Lint MegaLinter
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      megalinter-config:
        description: "Path to the MegaLinter configuration file (e.g., .mega-linter.yml)"
        required: false
        default: "development/megalinter.yml"
        type: string
      egress-policy:
        description: "Egress policy for the Harden Runner step (e.g., audit, block)"
        required: false
        default: "audit"
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  megalinter:
    name: MegaLinter Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      MEGALINTER_CONFIG: ${{ inputs.megalinter-config }} # Use the input value
      SARIF_UPLOAD_TOKEN: ${{ secrets.SARIF_UPLOAD_TOKEN }}
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 10
      - name: MegaLinter lint
        id: ml
        uses: oxsecurity/megalinter@8fbdead70d1409964ab3d5afa885e18ee85388bb # v9.4.0
      - name: Archive MegaLinter artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: MegaLinter reports
          path: |
            megalinter-reports
          retention-days: 5
      - name: Save MegaLinter SARIF artifact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-megalinter
          path: megalinter-reports/megalinter-report.sarif
          retention-days: 5
          if-no-files-found: ignore
      - name: Checkout reusable-ci scripts
        if: success() || failure()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Upload MegaLinter results to Code Scanning
        if: success() || failure()
        env:
          SARIF_FILE: megalinter-reports/megalinter-report.sarif
          SARIF_CATEGORY: megalinter
        run: bash .github-shared/scripts/security/upload-sarif.sh
