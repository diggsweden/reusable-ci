# NPM Builder
# 
# Purpose: Builds NPM projects and uploads artifacts for subsequent publishing steps.
# Separates build logic from registry-specific publishing.
#
# Build Process:
#   1. Install dependencies (npm ci)
#   2. Run tests (if configured)
#   3. Build application (if build script exists)
#   4. Upload built artifacts
#
# Outputs:
#   - Artifacts uploaded as 'npm-build-artifacts' for use by publish-* workflows
#
# Required Permissions:
#   contents: read  # Checkout code
#
name: Build NPM
on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: true
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      skip-tests:
        description: "Skip tests during build"
        required: false
        default: false
        type: boolean
      branch:
        description: "Branch to checkout"
        required: false
        default: "main"
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
      enable-build-sbom:
        description: "Run the cyclonedx-npm step (false skips Build SBOM generation entirely; derived from per-artefact 'sboms' when called from release-build-stage)"
        required: false
        default: true
        type: boolean
permissions:
  contents: read
jobs:
  build-npm:
    name: Build NPM Project
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs['node-version'] }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs['working-directory'] }}/package-lock.json
      - name: Get version info
        id: version-info
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          printf "VERSION=%s\n" "${VERSION}" >> "$GITHUB_OUTPUT"
          printf "NAME=%s\n" "${NAME}" >> "$GITHUB_OUTPUT"
          printf "Package: %s@%s\n" "${NAME}" "${VERSION}"
      - name: Install dependencies
        working-directory: ${{ inputs['working-directory'] }}
        run: npm ci
      - name: Run tests
        if: ${{ !inputs['skip-tests'] }}
        working-directory: ${{ inputs['working-directory'] }}
        run: npm test || printf "::warning::No tests configured\n"
      - name: Build application
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          if grep -q '"build"' package.json; then
            printf "Running build script...\n"
            npm run build
          else
            printf "No build script found, skipping build step\n"
          fi
      - name: Generate Build SBOM
        id: sbom
        if: ${{ inputs['enable-build-sbom'] }}
        continue-on-error: true
        working-directory: ${{ inputs['working-directory'] }}
        env:
          # renovate: datasource=npm depName=@cyclonedx/cyclonedx-npm
          CYCLONEDX_VERSION: "4.2.1"
        # One-shot npx runs the pinned version without mutating global state,
        # so a follow-up step can't inadvertently shadow the binary with a
        # different version.
        run: npx --yes "@cyclonedx/cyclonedx-npm@${CYCLONEDX_VERSION}" --output-format json --output-file bom.json
      - name: Write SBOM status to step summary
        if: always()
        env:
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          WORKDIR: ${{ inputs['working-directory'] }}
        run: |
          # shellcheck disable=SC2016  # backticks inside single quotes are intentional markdown
          {
            printf '### Build SBOM\n'
            bom="${WORKDIR%/}/bom.json"
            if [[ "$SBOM_OUTCOME" == "success" && -s "$bom" ]]; then
              printf -- '- ✅ CycloneDX: `%s`\n' "$bom"
            elif [[ "$SBOM_OUTCOME" == "success" ]]; then
              printf -- '- ⚠️ cyclonedx-npm reported success but produced no bom.json\n'
            else
              printf -- '- ⚠️ Generation step did not succeed (continued as advisory)\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: List built artifacts
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          printf "Package contents:\n"
          if [ -d "dist" ]; then
            printf "dist/ directory:\n"
            ls -lh dist/ || true
          fi
          if [ -d "build" ]; then
            printf "build/ directory:\n"
            ls -lh build/ || true
          fi
      - name: Pack NPM tarball
        id: pack
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          TARBALL=$(npm pack 2>&1 | tail -n 1)
          printf "tarball=%s\n" "$TARBALL" >> "$GITHUB_OUTPUT"
          printf "Created tarball: %s\n" "$TARBALL"
          ls -lh "$TARBALL"
      - name: Upload NPM artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: npm-build-artifacts
          path: ${{ inputs['working-directory'] }}/${{ steps.pack.outputs.tarball }}
          retention-days: 7
          if-no-files-found: error
      # Build SBOM is a separate compliance deliverable; see build-maven.yml
      # for rationale.
      - name: Upload NPM Build SBOM
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: npm-build-sbom
          path: ${{ inputs['working-directory'] }}/bom.json
          retention-days: 7
          if-no-files-found: warn
      - name: Generate build summary
        env:
          PACKAGE_NAME: ${{ steps.version-info.outputs.NAME }}
          VERSION: ${{ steps.version-info.outputs.VERSION }}
          NODE_VERSION: ${{ inputs['node-version'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
        run: bash .github-shared/scripts/summary/write-npm-build-summary.sh
