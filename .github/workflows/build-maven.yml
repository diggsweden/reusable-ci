# Maven Builder
# 
# Purpose: Builds Maven projects (applications or libraries) and uploads artifacts
# for subsequent publishing steps. Separates build logic from registry-specific publishing.
#
# Build Types:
#   - app: Standard application JAR (no sources/javadoc)
#   - lib: Library with sources and javadoc JARs (required for Maven Central)
#
# Outputs:
#   - Artifacts uploaded as 'maven-build-artifacts' for use by publish-* workflows
#
# Required Permissions:
#   contents: read  # Checkout code
#
name: Build Maven
on:
  workflow_call:
    inputs:
      build-type:
        description: "Build type: app (application) or lib (library with sources/javadoc)"
        required: true
        type: string
      java-version:
        description: "Java version"
        required: true
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      skip-tests:
        description: "Skip tests during build"
        required: false
        default: false
        type: boolean
      branch:
        description: "Branch to checkout"
        required: false
        default: "main"
        type: string
      profile:
        description: "Maven profile to activate (e.g., central-release for libraries)"
        required: false
        default: ""
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
      enable-build-sbom:
        description: "Run the cyclonedx plugin step (false skips Build SBOM generation entirely; derived from per-artefact 'sboms' when called from release-build-stage)"
        required: false
        default: true
        type: boolean
permissions:
  contents: read
env:
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress --errors --fail-at-end -Dstyle.color=always"
jobs:
  build-maven:
    name: Build Maven Project
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 1
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ inputs['java-version'] }}
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: ${{ inputs['working-directory'] }}/pom.xml
      - name: Install dependencies for multi-module projects
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          printf "Installing project modules to local repository...\n"
          # shellcheck disable=SC2086
          mvn $MAVEN_CLI_OPTS install -DskipTests
      - name: Get version info
        id: version-info
        working-directory: ${{ inputs['working-directory'] }}
        run: bash "${{ github.workspace }}/.github-shared/scripts/build/extract-maven-metadata.sh"
      - name: Build application
        if: ${{ inputs['build-type'] == 'app' }}
        working-directory: ${{ inputs['working-directory'] }}
        env:
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
        run: |
          printf "Building Maven application...\n"
          # shellcheck disable=SC2086
          if [ "$SKIP_TESTS" = "true" ]; then
            mvn $MAVEN_CLI_OPTS clean package -DskipTests
          else
            mvn $MAVEN_CLI_OPTS clean package
          fi
      - name: Build library with sources and javadoc
        if: ${{ inputs['build-type'] == 'lib' }}
        working-directory: ${{ inputs['working-directory'] }}
        env:
          MAVEN_PROFILE: ${{ inputs['profile'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
        run: bash "${{ github.workspace }}/.github-shared/scripts/build/maven-library.sh"
      - name: Generate Build SBOM
        id: sbom
        if: ${{ inputs['enable-build-sbom'] }}
        continue-on-error: true
        working-directory: ${{ inputs['working-directory'] }}
        env:
          # renovate: datasource=maven depName=org.cyclonedx:cyclonedx-maven-plugin
          CYCLONEDX_MAVEN_VERSION: "2.9.1"
        run: |
          # shellcheck disable=SC2086
          mvn $MAVEN_CLI_OPTS "org.cyclonedx:cyclonedx-maven-plugin:${CYCLONEDX_MAVEN_VERSION}:makeAggregateBom"
      - name: Write SBOM status to step summary
        if: always()
        env:
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          WORKDIR: ${{ inputs['working-directory'] }}
        run: |
          # shellcheck disable=SC2016  # backticks inside single quotes are intentional markdown
          {
            printf '### Build SBOM\n'
            if [[ "$SBOM_OUTCOME" == "success" ]]; then
              bom=$(find "$WORKDIR" -path '*/target/bom.json' 2>/dev/null | sort | head -1)
              if [[ -n "$bom" ]]; then
                printf -- '- ✅ CycloneDX (aggregate): `%s`\n' "$bom"
              else
                printf -- '- ⚠️ Plugin ran but no bom.json was written\n'
              fi
            else
              printf -- '- ⚠️ Generation step did not succeed (continued as advisory)\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: List built artifacts
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          printf "Built artifacts:\n"
          ls -lh target/*.jar 2>/dev/null || printf "No JAR files in root target/\n"
          ls -lh target/*.war 2>/dev/null || printf "No WAR files in root target/\n"

          printf "Checking for multi-module artifacts:\n"
          find . -type f -name "*.jar" -path "*/target/*" ! -name "original-*.jar" -exec ls -lh {} \; 2>/dev/null || printf "No JAR files found in sub-modules\n"
      - name: Upload Maven artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: maven-build-artifacts
          path: |
            ${{ inputs['working-directory'] }}/target/*.jar
            ${{ inputs['working-directory'] }}/target/*.war
            ${{ inputs['working-directory'] }}/target/*.pom
            ${{ inputs['working-directory'] }}/**/target/*.jar
            ${{ inputs['working-directory'] }}/**/target/*.war
            ${{ inputs['working-directory'] }}/**/target/*.pom
            !${{ inputs['working-directory'] }}/target/original-*.jar
            !${{ inputs['working-directory'] }}/**/target/original-*.jar
          retention-days: 7
          if-no-files-found: warn
      # Build SBOM is a separate compliance deliverable; keeping it in its
      # own artifact means a broken SBOM plugin can't take down the code
      # artifact and downstream consumers can fetch just what they need.
      - name: Upload Maven Build SBOM
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: maven-build-sbom
          path: |
            ${{ inputs['working-directory'] }}/target/bom.json
            ${{ inputs['working-directory'] }}/**/target/bom.json
          retention-days: 7
          if-no-files-found: warn
      - name: Generate build summary
        env:
          BUILD_TYPE: ${{ inputs['build-type'] }}
          GROUP_ID: ${{ steps.version-info.outputs.GROUP_ID }}
          ARTIFACT_ID: ${{ steps.version-info.outputs.ARTIFACT_ID }}
          VERSION: ${{ steps.version-info.outputs.VERSION }}
          JAVA_VERSION: ${{ inputs['java-version'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
          IS_SNAPSHOT: ${{ steps.version-info.outputs.IS_SNAPSHOT }}
        run: bash .github-shared/scripts/summary/write-maven-build-summary.sh
