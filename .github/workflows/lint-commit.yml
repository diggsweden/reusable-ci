# Description:
# This workflow enforces commit message conventions using gommitlint.
# It checks commit messages against a predefined set of rules to ensure consistency and compliance.
#
# Usage:
# 1. Add the following to your workflow file:
#    jobs:
#      commit-lint:
#        uses: <orgname>/<reponame>/.github/workflows/<workflowname>.yml@72b9c326139080c9a9c91999ada2d62d19e7ee54 # v2.7.0
#        # base-branch parameter is optional - auto-detects PR target branch
#        # with:
#        #   base-branch: "custom-branch"  # Only needed for special cases
#
# 2. Optionally add a `.gommitlint.yaml` configuration file to your repository.
#    If not, gommitlint will use its default rules (conventional commits, etc.).
#
# 3. The workflow will analyze commits in pull requests and enforce the configured rules.
#    It automatically compares against the PR's target branch.
name: Lint Commit
on:
  workflow_call:
    inputs:
      base-branch:
        description: "Base branch to compare commits against (auto-detects PR target if empty)"
        required: false
        default: ""
        type: string
permissions:
  contents: read
jobs:
  commit-lint:
    name: Commit Lint Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }} # https://github.com/actions/checkout/issues/426
      - name: Determine base branch
        id: base
        run: |
          set_base_branch() {
            local branch="$1"
            local message="$2"

            printf "branch=%s\n" "$branch" >> "$GITHUB_OUTPUT"
            printf "%s\n" "$message"
          }

          # If explicitly provided, use it
          if [ -n "${{ inputs.base-branch }}" ]; then
            set_base_branch "${{ inputs.base-branch }}" "Using explicitly provided base: ${{ inputs.base-branch }}"
          # For PRs, use the PR target branch
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ -n "${{ github.base_ref }}" ]; then
            set_base_branch "${{ github.base_ref }}" "Auto-detected PR base: ${{ github.base_ref }}"
          # Fallback to main
          else
            set_base_branch "main" "Using default base: main"
          fi
      - name: Setup base branch
        run: git fetch origin ${{ steps.base.outputs.branch }}:${{ steps.base.outputs.branch }}
      - name: Install gommitlint
        env:
          # renovate: datasource=gitea-releases depName=itiquette/gommitlint registryUrl=https://codeberg.org
          GOMMITLINT_VERSION: "0.9.4"
        run: |
          printf "Installing gommitlint v%s\n" "$GOMMITLINT_VERSION"
          curl -sSfL "https://codeberg.org/itiquette/gommitlint/releases/download/v${GOMMITLINT_VERSION}/gommitlint-${GOMMITLINT_VERSION}-linux-x86_64.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin "gommitlint-${GOMMITLINT_VERSION}-linux-x86_64/gommitlint"
      - name: Commit lint analysis
        run: gommitlint validate --base-branch=${{ steps.base.outputs.branch }} --format=github
