# ⚠️ INTERNAL USE ONLY - PR validation workflow for reusable-ci itself
# This workflow validates pull requests to reusable-ci using pullrequest-orchestrator.
# For templates to use in YOUR project, see examples/ directory.
name: Self Pull Request
on:
  pull_request:
    branches:
      - main
      - feat/**
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate:
    uses: ./.github/workflows/pullrequest-orchestrator.yml
    permissions:
      contents: read
      packages: read
    with:
      project-type: npm
      reusable-ci-ref: ${{ github.head_ref }}
      linters.devbasecheck: true
      linters.dependencyreview: true
      linters.commitlint: false
      linters.licenselint: false
      linters.megalint: false
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      - uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
        with:
          # renovate: datasource=github-releases depName=casey/just
          just-version: 1.50.0
      - name: Setup test dependencies
        run: just test-setup
      - name: Validate reusable workflow input defaults
        run: ./scripts/validate/workflow-input-defaults.sh
      - name: Run tests
        run: just test
