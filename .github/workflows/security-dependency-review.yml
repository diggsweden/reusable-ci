# Description:
# This workflow scans project dependencies for known vulnerabilities using Trivy.
# In diff mode (default for PRs), only newly introduced vulnerabilities cause failure.
# Results are uploaded as SARIF for inline PR annotations via GitHub Code Scanning.
#
# Usage:
# 1. Add the following to your workflow file:
#    jobs:
#      dependency-review:
#        uses: <orgname>/<reponame>/.github/workflows/<workflowname>.yml@72b9c326139080c9a9c91999ada2d62d19e7ee54 # v2.7.0
#        with:
#          fail-on-severity: "critical" # Optional, default is "critical"
#
# 2. The workflow will scan dependencies and fail if new vulnerabilities of the
#    specified severity level are found.
#    Supported severity levels: critical, high, moderate, low.
name: Review Dependencies
on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Severity level to fail the workflow (e.g., critical, high, moderate, low)"
        required: false
        default: "critical"
        type: string
      reusable-ci-ref:
        description: "Git ref for reusable-ci scripts checkout"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
  security-events: write
jobs:
  dependency-review:
    name: Dependency Review Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Scan dependencies
        env:
          FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
          SCAN_MODE: diff
        run: bash .github-shared/scripts/security/scan-dependencies.sh
      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('trivy-dependency-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: trivy-dependency-results.sarif
          category: dependency-review
