# Description:
# This workflow scans project dependencies for known vulnerabilities using Trivy.
# In diff mode (default for PRs), only newly introduced vulnerabilities cause failure.
# Results are uploaded as SARIF for inline PR annotations via GitHub Code Scanning.
#
# Usage:
# 1. Add the following to your workflow file:
#    jobs:
#      dependency-review:
#        uses: <orgname>/<reponame>/.github/workflows/<workflowname>.yml@72b9c326139080c9a9c91999ada2d62d19e7ee54 # v2.7.0
#        with:
#          fail-on-severity: "critical" # Optional, default is "critical"
#
# 2. The workflow will scan dependencies and fail if new vulnerabilities of the
#    specified severity level are found.
#    Supported severity levels: critical, high, moderate, low.
name: Review Dependencies
on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: "Severity level to fail the workflow (e.g., critical, high, moderate, low)"
        required: false
        default: "critical"
        type: string
      reusable-ci-ref:
        description: "Git ref for reusable-ci scripts checkout"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  # Analysis job: runs the dependency scan and uploads SARIF as an artifact.
  # Consistent shape with security-openssf-scorecard.yml: SARIF upload to
  # Code Scanning is decoupled into its own job to keep each analysis job
  # focused on one concern.
  dependency-review:
    name: Dependency Review Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Checkout reusable-ci scripts
        if: always()
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Scan dependencies
        env:
          FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
          SCAN_MODE: diff
        run: bash .github-shared/scripts/security/scan-dependencies.sh
      - name: Save dependency review SARIF artifact
        if: always() && hashFiles('trivy-dependency-results.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-dependency-review
          path: trivy-dependency-results.sarif
          retention-days: 5
          if-no-files-found: ignore

  # Publishes SARIF to Code Scanning in a separate job. Marked
  # continue-on-error so a transient Code Scanning API failure doesn't
  # turn the workflow red — the scan result itself is the primary signal.
  publish-sarif:
    name: Upload SARIF to Code Scanning
    needs: [dependency-review]
    if: always() && needs.dependency-review.result != 'cancelled' && needs.dependency-review.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Download dependency review SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sarif-dependency-review
        continue-on-error: true
      - name: Checkout reusable-ci scripts
        if: hashFiles('trivy-dependency-results.sarif') != ''
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Upload dependency review results to Code Scanning
        if: hashFiles('trivy-dependency-results.sarif') != ''
        continue-on-error: true
        env:
          SARIF_UPLOAD_TOKEN: ${{ secrets.SARIF_UPLOAD_TOKEN }}
          SARIF_FILE: trivy-dependency-results.sarif
          SARIF_CATEGORY: dependency-review
        run: bash .github-shared/scripts/security/upload-sarif.sh
