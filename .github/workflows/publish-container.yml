# SPDX-License-Identifier: CC0-1.0
# Container Image Publisher
#
# Purpose: Builds and publishes production-grade container images to any
# OCI-compatible registry with security features including multi-platform
# support, vulnerability scanning, SBOM generation, and SLSA attestation
# (GHCR only).
#
# Supported Registries:
# - GitHub Container Registry (ghcr.io) - Full SLSA support
# - Docker Hub (docker.io) - No SLSA support
# - Quay.io (quay.io) - No SLSA support
# - Any OCI-compatible registry - No SLSA support
#
# How it works:
# 1. prep: compute image coordinate, tags (docker/metadata-action), and
#    labels once. Validate namespace early.
# 2. build-arch (matrix, fail-fast: false): per-platform native runner
#    (linux/amd64 -> ubuntu-24.04, linux/arm64 -> ubuntu-24.04-arm).
#    Each leg builds and pushes by digest only — no tag is applied yet.
#    Within the same job: per-arch Trivy scan (SARIF category-suffixed),
#    per-arch syft SBOM (artefact upload suffixed), per-arch attest-sbom
#    against the per-arch digest, per-arch extract-binary. Buildkit
#    provenance attaches to each platform digest via `provenance: mode=max`.
# 3. merge: assembles the per-arch digests into a single manifest list
#    via `docker buildx imagetools create`, applying all tags from
#    metadata-action. Single-arch inputs go through the same pipeline
#    (matrix-of-1 + one-entry manifest list).
# 4. provenance (separate workflow_call): SLSA L3 generator attests the
#    manifest list digest. Same as today's behaviour, just consuming
#    merge's output instead of build-and-push's.
#
# No QEMU. Each runner builds its own architecture natively.
#
# Security controls:
# - SLSA Level 3 provenance attestation against the manifest list (GHCR only)
# - Per-platform buildkit provenance (provenance: mode=max) attached to each
#   platform digest
# - Per-platform vulnerability scan with Trivy; per-arch SARIF category
#   suffixing keeps both arches visible in Code Scanning
# - Per-platform SBOM generation (analyzed-container layer) with attest-sbom
#   against the per-arch digest
# - Signed attestations attached to image
# - Security scan results uploaded to Code Scanning (when SARIF_UPLOAD_TOKEN
#   is configured)
# - Namespace validation (enforces ghcr.io/OWNER/REPO pattern)
#
# Registry Authentication:
#   GHCR (default): Uses GITHUB_TOKEN (no secrets needed)
#   Other registries: Set useGithubToken=false and provide registryPassword secret
#
# Required Secrets:
#   registryPassword: Required when useGithubToken=false (for Docker Hub, Quay, etc)
#   SARIF_UPLOAD_TOKEN: Optional — uploads Trivy scan results to Code Scanning
#
# Required Permissions:
#   contents: read         # Read Containerfile and context
#   packages: write        # Push images to registry
#   id-token: write        # Generate OIDC token for SLSA (GHCR only)
#   secrets: inherit       # Pass SARIF_UPLOAD_TOKEN for Code Scanning upload
#   attestations: write    # Attach SBOM attestation
#   actions: read          # Read workflow for provenance
#   security-events: write # Upload SARIF (only required when running without
#                            SARIF_UPLOAD_TOKEN; the script falls back to the
#                            github/codeql-action upload path)
#
# Outputs:
#   image: Full image name with primary tag
#   digest: Manifest list digest
#   metadata: Image metadata JSON (from docker/metadata-action)
#
# Tagging Strategy (applied to the manifest list, not per-arch):
#   - semver: Version-based tags (v1.0.0, v1, v1.0)
#   - branch: Branch-based tags (main, develop)
#   - sha: SHA-based tags (main-abc1234)
name: Publish Container
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      container-file:
        description: "Containerfile path"
        required: false
        default: "Containerfile"
        type: string
      context:
        description: "Build context directory"
        required: false
        default: "."
        type: string
      branch:
        description: "Branch to checkout (default: main)"
        required: false
        default: "main"
        type: string
      platforms:
        description: "Comma-separated list of platforms to build. Each platform builds natively on a runner of that architecture (linux/amd64 -> ubuntu-24.04, linux/arm64 -> ubuntu-24.04-arm). No QEMU emulation. Multi-platform inputs split across runners and are merged into a single manifest list."
        required: false
        default: "linux/amd64"
        type: string
      artifact-types:
        description: "Comma-separated artifact types (maven,npm,gradle)"
        required: true
        type: string
      gradle-artifact-name:
        description: "Name of the uploaded gradle build artifact to download. Default `gradle-build-artifacts`. Override to match a matrix-named gradle artifact (build-gradle-app.yml's `artifact-name` input). Maven and npm builders currently have no such override; thread-through for those stacks is tracked for a follow-up PR."
        required: false
        default: ""
        type: string
      enable-slsa:
        description: "Generate SLSA provenance"
        required: false
        default: true
        type: boolean
      enable-analyzed-container-sbom:
        description: "Run syft on the pushed image and produce the analyzed-container SBOM. Sibling of enable-slsa/enable-scan. When called from release-publish-stage this is derived from source artefacts' sboms; direct callers default to true."
        required: false
        default: true
        type: boolean
      enable-scan:
        description: "Enable vulnerability scanning"
        required: false
        default: true
        type: boolean
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      image-name:
        description: "Custom image name (defaults to repository name)"
        required: false
        type: string
      build-args:
        description: "Build arguments (KEY=VALUE format, one per line)"
        required: false
        type: string
      target:
        description: "Containerfile stage to build for the runtime image. Empty defaults to the last stage (current docker behavior). Useful for multi-stage Containerfiles where the deployable image is not the last stage."
        required: false
        default: ""
        type: string
      name:
        description: "Container artefact name from artifacts.yml. Namespaces the optional binary upload artefact (extract-binary) AND the published image — when set, the image becomes <registry>/<repository>/<name>:<tag>, giving each container in a multi-container project its own GitHub Packages page. Empty (or set to the repo's short name — the common single-container case) preserves single-image behaviour (<registry>/<repository>:<tag>). Overridden by `image-name` if both are set."
        required: false
        default: ""
        type: string
      extract-binary-target:
        description: "Containerfile stage to extract as a binary CI artefact (typically `FROM scratch AS export-binary` with COPY --from=builder). When set, a second buildx build runs per arch leg with --output type=local and the result is uploaded as ${name}-binaries-${arch}. Used by compiled-native ecosystems (cargo, go) where binaries are byproducts of the container build."
        required: false
        default: ""
        type: string
      extract-binary-names:
        description: "Comma-separated binary file names expected in the export-binary stage output. Used in the step summary for visibility; not enforced."
        required: false
        default: ""
        type: string
      build-secrets:
        description: "Build secrets to pass (KEY=VALUE format, one per line)"
        required: false
        type: string
      push-image:
        description: "Push image to registry"
        required: false
        default: true
        type: boolean
      cache-from:
        description: "Cache sources for build. Honoured on the single-arch path. The multi-arch matrix uses per-arch GHA cache scoping internally; a custom cache-from is ignored on that path. Multi-arch callers needing non-default caches should file an issue."
        required: false
        default: "type=gha"
        type: string
      cache-to:
        description: "Cache destinations for build. Honoured on the single-arch path. The multi-arch matrix uses per-arch GHA cache scoping internally; a custom cache-to is ignored on that path."
        required: false
        default: "type=gha,mode=max"
        type: string
      egress-policy:
        description: "Egress policy for the Harden Runner step"
        required: false
        default: "audit"
        type: string
      registry-username:
        description: "Registry username (defaults to github.actor for GHCR)"
        required: false
        type: string
      use-ci-token:
        description: "Use GITHUB_TOKEN for authentication (GHCR only)"
        required: false
        default: true
        type: boolean
      enforce-namespace:
        description: "Enforce namespace validation (defaults to repository owner)"
        required: false
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
    secrets:
      registry-password:
        description: "Registry password/token (required when use-ci-token=false)"
        required: false
      SARIF_UPLOAD_TOKEN:
        description: "Token with code_scanning_alerts:write for uploading SARIF to Code Scanning"
        required: false
    outputs:
      image:
        description: "Full image name with primary tag"
        value: ${{ jobs.merge.outputs.image }}
      digest:
        description: "Manifest list digest"
        value: ${{ jobs.merge.outputs.digest }}
      metadata:
        description: "Image metadata JSON (from docker/metadata-action)"
        value: ${{ jobs.prep.outputs.metadata }}
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  prep:
    name: Prepare Build${{ inputs.name && format(' ({0})', inputs.name) || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      image-name: ${{ steps.image-name.outputs.name }}
      tags: ${{ steps.metadata.outputs.tags }}
      labels: ${{ steps.metadata.outputs.labels }}
      metadata: ${{ steps.metadata.outputs.json }}
      platforms-json: ${{ steps.platforms.outputs.json }}
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Determine Image Name
        id: image-name
        env:
          TARGET_REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME_INPUT: ${{ inputs['image-name'] }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          NAME: ${{ inputs.name }}
        run: |
          bash .github-shared/scripts/container/resolve-image-name.sh \
            "$TARGET_REGISTRY" \
            "$IMAGE_NAME_INPUT" \
            "$REPOSITORY" \
            "$REPOSITORY_OWNER" \
            "$NAME" >> "$GITHUB_OUTPUT"
      - name: Validate Image Namespace
        if: ${{ inputs['push-image'] }}
        env:
          IMAGE_NAME: ${{ steps.image-name.outputs.name }}
          REPOSITORY: ${{ github.repository }}
          TARGET_REGISTRY: ${{ inputs.registry }}
          ENFORCE_NAMESPACE: ${{ inputs['enforce-namespace'] || github.repository_owner }}
        run: |
          bash .github-shared/scripts/container/validate-namespace.sh \
            "$IMAGE_NAME" \
            "$REPOSITORY" \
            "$TARGET_REGISTRY" \
            "$ENFORCE_NAMESPACE"
      - name: Extract Image Metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.image-name.outputs.name }}
          flavor: |
            latest=false
          tags: |
            # Always include the ref as-is (branch name, tag name, or PR number)
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

            # For version tags only (v1.0.0, v2.3.4, etc)
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}

            # For stable versions only (no dash in tag name like -beta, -rc)
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

            # SHA-based tags for non-tag refs (branches, PRs) for traceability
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
      - name: Compute platforms JSON
        id: platforms
        env:
          NAME: ${{ inputs.name }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          # Convert "linux/amd64,linux/arm64" -> JSON array for matrix consumption.
          JSON=$(printf '%s\n' "${PLATFORMS//,/$'\n'}" | jq -R . | jq -s -c .)
          printf "json=%s\n" "${JSON}" >> "$GITHUB_OUTPUT"
          printf "→ Container: %s\n" "${NAME:-(unnamed)}"
          printf "→ Platforms: %s\n" "${PLATFORMS}"

  build-arch:
    name: Build${{ inputs.name && format(' ({0})({1})', inputs.name, matrix.platform) || format(' ({0})', matrix.platform) }}
    needs: prep
    # linux/arm64 -> ubuntu-24.04-arm (native ARM hosted runner). Anything
    # else falls through to ubuntu-24.04. No QEMU emulation in either path.
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.prep.outputs.platforms-json) }}
    permissions:
      contents: read
      packages: write
      id-token: write # Required for SLSA provenance + attest-sbom
      attestations: write # Required for SBOM attestation
      actions: read # Required for SLSA provenance v2
    env:
      SARIF_UPLOAD_TOKEN: ${{ secrets.SARIF_UPLOAD_TOKEN }}
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Derive arch suffix
        id: arch
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          # linux/amd64 -> amd64, linux/arm64 -> arm64. Used for cache,
          # artefact, and SARIF-category scoping so the matrix legs don't
          # collide with each other.
          SUFFIX="${PLATFORM#linux/}"
          SUFFIX="${SUFFIX//\//-}"
          printf "suffix=%s\n" "$SUFFIX" >> "$GITHUB_OUTPUT"
      - name: Download Maven artifacts
        if: &if_has_maven_artifacts ${{ contains(inputs['artifact-types'], 'maven') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: maven-build-artifacts
          path: ./
      - name: Verify Maven artifacts
        if: *if_has_maven_artifacts
        run: bash .github-shared/scripts/container/validate-artifacts.sh maven target
      - name: Download NPM artifacts
        if: &if_has_npm_artifacts ${{ contains(inputs['artifact-types'], 'npm') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: npm-build-artifacts
          path: ./
      - name: Extract NPM tarball
        if: *if_has_npm_artifacts
        run: bash .github-shared/scripts/container/extract-npm-tarball.sh
      - name: Verify NPM artifacts
        if: *if_has_npm_artifacts
        env:
          CONTAINER_CONTEXT: ${{ inputs.context }}
          CONTAINER_FILE: ${{ inputs['container-file'] }}
        run: bash .github-shared/scripts/container/validate-artifacts.sh npm dist "$CONTAINER_CONTEXT/$CONTAINER_FILE"
      - name: Download Gradle artifacts
        if: &if_has_gradle_artifacts ${{ contains(inputs['artifact-types'], 'gradle') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: ${{ inputs['gradle-artifact-name'] || 'gradle-build-artifacts' }}
          path: build/libs/
      - name: Verify Gradle artifacts
        if: *if_has_gradle_artifacts
        run: bash .github-shared/scripts/container/validate-artifacts.sh gradle build/libs
      - name: Verify Containerfile
        id: containerfile
        env:
          CONTAINER_FILE: ${{ inputs['container-file'] }}
        run: bash .github-shared/scripts/container/validate-containerfile.sh "$CONTAINER_FILE"
      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Check registry authentication configuration
        if: &if_push_image ${{ inputs['push-image'] }}
        env:
          USE_CI_TOKEN: ${{ inputs['use-ci-token'] }}
          TARGET_REGISTRY: ${{ inputs.registry }}
          CI_REGISTRY: ghcr.io
          REGISTRY_PASSWORD: ${{ secrets['registry-password'] }}
        run: bash .github-shared/scripts/registry/validate-auth.sh
      - name: Log in to Container Registry
        if: *if_push_image
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs['registry-username'] || github.actor }}
          password: ${{ inputs['use-ci-token'] && secrets.GITHUB_TOKEN || secrets['registry-password'] }}
      - name: Build by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.containerfile.outputs.containerfile }}
          target: ${{ inputs.target }}
          platforms: ${{ matrix.platform }}
          # No tag at this stage. The merge job applies all tags from
          # metadata-action via `docker buildx imagetools create` once both
          # arches' digests exist. push-by-digest pushes the image without
          # tagging; name-canonical=true ensures the digest reference uses
          # the canonical image name.
          outputs: ${{ inputs['push-image'] && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', needs.prep.outputs.image-name) || format('type=image,name={0}', needs.prep.outputs.image-name) }}
          labels: ${{ needs.prep.outputs.labels }}
          # Per-arch GHA cache scope keeps the matrix legs from evicting
          # each other. Custom cache-from/cache-to inputs are not threaded
          # into the multi-arch matrix today (documented on the input).
          cache-from: type=gha,scope=build-${{ steps.arch.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.arch.outputs.suffix }}
          build-args: ${{ inputs['build-args'] }}
          secrets: ${{ inputs['build-secrets'] }}
          provenance: ${{ inputs['enable-slsa'] && 'mode=max' || 'false' }}
          sbom: ${{ inputs['enable-analyzed-container-sbom'] }}
      - name: Check SLSA compatibility
        if: ${{ inputs['push-image'] && inputs['enable-slsa'] && inputs.registry != 'ghcr.io' }}
        env:
          TARGET_REGISTRY: ${{ inputs.registry }}
        run: |
          printf "::notice::SLSA provenance generation only supports ghcr.io registry\n"
          printf "::notice::Current registry: %s\n" "$TARGET_REGISTRY"
          printf "::notice::SLSA provenance attestation will be skipped\n"
          printf "::notice::To enable SLSA: Use registry: ghcr.io or set enable-slsa: false\n"
      - name: Export digest
        if: *if_push_image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          # Filename is the bare hash; the merge step rebuilds <name>@sha256:<hash>.
          touch "/tmp/digests/${DIGEST#sha256:}"
      # Artefact names MUST be unique across the entire workflow run, not
      # just within this workflow_call invocation: when multiple containers
      # are matrix-dispatched (release-publish-stage's per-container
      # matrix), each container's publish-container call shares
      # github.run_id. Without per-container scoping, hsm-worker's
      # digests-<run_id>-amd64 would collide with wallet-bff's; one upload
      # silently wins and the merge job downloads the wrong container's
      # digest. Same root cause applies to SARIF + SBOM uploads below.
      - name: Upload digest
        if: *if_push_image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ github.run_id }}-${{ inputs.name || 'container' }}-${{ steps.arch.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Scan Container Image${{ inputs.name && format(' ({0})', inputs.name) || '' }}
        if: &if_scan_enabled ${{ inputs['enable-scan'] && inputs['push-image'] }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        env:
          # The image was pushed by digest only — never loaded into the local
          # docker daemon — so trivy falls through to remote pull. In remote
          # mode trivy's default target platform is linux/amd64, which works
          # accidentally on the amd64 leg but fails on every other arch with
          # "no child with platform linux/amd64 in index" (buildkit's
          # provenance: mode=max + sbom: true wraps the per-arch image in an
          # OCI index alongside attestations). Pin the platform per leg so
          # each scan resolves to its own child manifest.
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ needs.prep.outputs.image-name }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
      - name: Save container scan SARIF artifact
        if: *if_scan_enabled
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sarif-container-scan-${{ inputs.name || 'container' }}-${{ steps.arch.outputs.suffix }}
          path: trivy-results.sarif
          retention-days: 5
          if-no-files-found: ignore
      - name: Upload container scan results to Code Scanning
        if: *if_scan_enabled
        env:
          SARIF_FILE: trivy-results.sarif
          # Per-(container, arch) category keeps every leg visible in Code
          # Scanning; GitHub dedupes per (category, file). Without the
          # per-container scoping, two containers' amd64 scans share a
          # category and one silently overwrites the other.
          SARIF_CATEGORY: container-scan-${{ inputs.name || 'container' }}-${{ steps.arch.outputs.suffix }}
        run: bash .github-shared/scripts/security/upload-sarif.sh
      - name: Generate Container SBOMs${{ inputs.name && format(' — {0}', inputs.name) || '' }} (SPDX + CycloneDX)
        if: &if_sbom_enabled ${{ inputs['enable-analyzed-container-sbom'] && inputs['push-image'] }}
        env:
          ARTIFACT_TYPES: ${{ inputs['artifact-types'] }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_NAME: ${{ needs.prep.outputs.image-name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SBOM_SCRIPT_ROOT: .github-shared/scripts/sbom
        run: bash .github-shared/scripts/sbom/generate-container-sbom-artifacts.sh
      - name: Upload Analyzed-Container SBOMs
        if: *if_sbom_enabled
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-(container, arch) suffix avoids upload-artifact name
          # collision across the workflow run; every leg's SBOM lands as
          # a separate release-attached artefact.
          name: analyzed-container-sbom-${{ github.run_id }}-${{ inputs.name || 'container' }}-${{ steps.arch.outputs.suffix }}
          path: |
            *-analyzed-container-sbom.spdx.json
            *-analyzed-container-sbom.cyclonedx.json
          retention-days: 30
      - name: Find Container SBOM file
        if: &if_sbom_and_slsa_enabled ${{ inputs['enable-analyzed-container-sbom'] && inputs['push-image'] && inputs['enable-slsa'] }}
        id: find-sbom
        run: bash .github-shared/scripts/sbom/find-container-sbom.sh
      - name: Attest Container SBOM${{ inputs.name && format(' — {0}', inputs.name) || '' }}
        if: *if_sbom_and_slsa_enabled
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-name: ${{ needs.prep.outputs.image-name }}
          # Per-arch digest: each platform image gets its own SBOM
          # attestation. cosign verify-attestation against the per-arch
          # digest succeeds for the corresponding platform.
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ steps.find-sbom.outputs.sbom-file }}
          push-to-registry: true
      # Optional binary extraction (container-first / compiled-native ecosystems).
      # Each native arch leg extracts its own binary directly. No QEMU.
      # Per-arch artefact name avoids upload-artifact collision.
      - name: Extract binaries${{ inputs.name && format(' ({0})', inputs.name) || '' }}
        if: ${{ inputs['extract-binary-target'] != '' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.containerfile.outputs.containerfile }}
          target: ${{ inputs['extract-binary-target'] }}
          platforms: ${{ matrix.platform }}
          push: false
          outputs: type=local,dest=./extracted-binaries
          cache-from: type=gha,scope=build-${{ steps.arch.outputs.suffix }}
          build-args: ${{ inputs['build-args'] }}
          secrets: ${{ inputs['build-secrets'] }}
      # Suffix each extracted binary's basename with -linux-${arch} so that
      # when the GitHub Release attach step pulls per-arch artefacts together,
      # they don't collide on the same basename. Convention matches Go's
      # release-asset naming (e.g., hsm-worker-linux-amd64,
      # hsm-worker-linux-arm64).
      - name: Suffix extracted binaries with arch
        if: ${{ inputs['extract-binary-target'] != '' }}
        env:
          SUFFIX: ${{ steps.arch.outputs.suffix }}
          EXPECTED_NAMES: ${{ inputs['extract-binary-names'] }}
        run: |
          bash .github-shared/scripts/container/suffix-extracted-binaries.sh \
            ./extracted-binaries \
            "$SUFFIX" \
            "$EXPECTED_NAMES"
      - name: Upload extracted binaries${{ inputs.name && format(' ({0})', inputs.name) || '' }}
        if: ${{ inputs['extract-binary-target'] != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.name != '' && format('{0}-binaries-{1}', inputs.name, steps.arch.outputs.suffix) || format('container-binaries-{0}', steps.arch.outputs.suffix) }}
          path: ./extracted-binaries/**
          retention-days: 30
          if-no-files-found: error
      - name: Write binary extraction summary
        if: ${{ inputs['extract-binary-target'] != '' }}
        env:
          ARTEFACT_NAME: ${{ inputs.name != '' && format('{0}-binaries-{1}', inputs.name, steps.arch.outputs.suffix) || format('container-binaries-{0}', steps.arch.outputs.suffix) }}
          DISPLAY_NAME: ${{ inputs.name || 'container' }}
          EXTRACT_TARGET: ${{ inputs['extract-binary-target'] }}
          EXPECTED_NAMES: ${{ inputs['extract-binary-names'] }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          {
            printf '### Extracted Binaries — %s (%s)\n\n' "$DISPLAY_NAME" "$PLATFORM"
            printf -- '- **Stage:** %s\n' "$EXTRACT_TARGET"
            printf -- '- **Artefact:** %s\n' "$ARTEFACT_NAME"
            printf -- '- **Platform:** %s\n' "$PLATFORM"
            if [[ -n "$EXPECTED_NAMES" ]]; then
              printf -- '- **Binaries:** %s\n' "$EXPECTED_NAMES"
            fi
            printf '\n'
            printf 'Files in extracted-binaries/:\n\n'
            find ./extracted-binaries -type f 2>/dev/null | sort | head -50 || true
          } >> "$GITHUB_STEP_SUMMARY"

  merge:
    name: Merge Manifest${{ inputs.name && format(' ({0})', inputs.name) || '' }}
    needs: [prep, build-arch]
    if: ${{ inputs['push-image'] }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.outputs.outputs.image }}
      digest: ${{ steps.outputs.outputs.digest }}
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ github.run_id }}-${{ inputs.name || 'container' }}-*
          merge-multiple: true
      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Check registry authentication configuration
        env:
          USE_CI_TOKEN: ${{ inputs['use-ci-token'] }}
          TARGET_REGISTRY: ${{ inputs.registry }}
          CI_REGISTRY: ghcr.io
          REGISTRY_PASSWORD: ${{ secrets['registry-password'] }}
        run: bash .github-shared/scripts/registry/validate-auth.sh
      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs['registry-username'] || github.actor }}
          password: ${{ inputs['use-ci-token'] && secrets.GITHUB_TOKEN || secrets['registry-password'] }}
      - name: Create manifest list and push
        env:
          IMAGE_NAME: ${{ needs.prep.outputs.image-name }}
          TAGS: ${{ needs.prep.outputs.tags }}
        working-directory: /tmp/digests
        run: |
          # Each file in /tmp/digests is named after a per-arch digest hash.
          # Reconstruct ${IMAGE_NAME}@sha256:<hash> references and feed them
          # to imagetools, which assembles a multi-arch manifest list and
          # pushes it under each tag from metadata-action. Single-arch
          # inputs degenerate to a one-entry manifest list — same code path.
          refs=()
          for f in *; do
            refs+=("${IMAGE_NAME}@sha256:${f}")
          done
          tag_args=()
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            tag_args+=("-t" "$tag")
          done <<<"$TAGS"

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"
      - name: Inspect manifest and emit outputs
        id: outputs
        env:
          TAGS: ${{ needs.prep.outputs.tags }}
        run: |
          PRIMARY_TAG=$(printf "%s\n" "$TAGS" | head -n1)
          docker buildx imagetools inspect "${PRIMARY_TAG}"
          DIGEST=$(docker buildx imagetools inspect "${PRIMARY_TAG}" --format '{{json .Manifest}}' | jq -r '.digest')
          printf "image=%s\n" "${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
          printf "digest=%s\n" "${DIGEST}" >> "$GITHUB_OUTPUT"

  # SLSA L3 provenance attestation against the manifest list digest.
  # Stays as a separate workflow_call to slsa-framework/slsa-github-generator;
  # the per-platform buildkit provenance attached by build-push-action covers
  # platform-level attestation.
  provenance:
    needs: merge
    if: ${{ inputs['push-image'] && inputs['enable-slsa'] && startsWith(github.ref, 'refs/tags/') && inputs.registry == 'ghcr.io' }}
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.merge.outputs.image }}
      digest: ${{ needs.merge.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
