# Container Image Publisher
# 
# Purpose: Builds and publishes production-grade container images to any OCI-compatible
# registry with  security features including multi-platform support,
# vulnerability scanning, SBOM generation, and SLSA attestation (GHCR only).
#
# Supported Registries:
# - GitHub Container Registry (ghcr.io) - Full SLSA support
# - Docker Hub (docker.io) - No SLSA support
# - Quay.io (quay.io) - No SLSA support
# - Any OCI-compatible registry - No SLSA support
#
# How it works:
# 1. Downloads build artifacts from previous jobs (Maven JARs, NPM dist)
# 2. Sets up Buildx for multi-platform builds
# 3. Builds container image for specified platforms (amd64, arm64)
# 4. Scans image for vulnerabilities using Trivy
# 5. Generates SBOM in multiple formats (CycloneDX, SPDX)
# 6. Creates SLSA provenance attestation for supply chain security (GHCR only)
# 7. Pushes image with all attestations to registry
#
# Security controls:
# - SLSA Level 3 provenance attestation (GHCR only)
# - Vulnerability scanning with severity thresholds
# - SBOM generation for dependency transparency
# - Signed attestations attached to image
# - Security scan results uploaded to GitHub
# - Namespace validation (enforces ghcr.io/OWNER/REPO pattern)
#
# Registry Authentication:
#   GHCR (default): Uses GITHUB_TOKEN (no secrets needed)
#   Other registries: Set useGithubToken=false and provide registryPassword secret
#
# Required Secrets:
#   registryPassword: Required when useGithubToken=false (for Docker Hub, Quay, etc)
#
# Required Permissions:
#   contents: read         # Read Containerfile and context
#   packages: write        # Push images to registry
#   id-token: write       # Generate OIDC token for SLSA (GHCR only)
#   security-events: write # Upload vulnerability scan results
#   attestations: write   # Attach SBOM attestation
#   actions: read         # Read workflow for provenance
#
# Outputs:
#   image: Full image name with registry
#   digest: Image digest for verification
#   metadata: Image metadata JSON
#
# Tagging Strategy:
#   - semver: Version-based tags (v1.0.0, v1, v1.0)
#   - branch: Branch-based tags (main, develop)
#   - sha: SHA-based tags (main-abc1234)
#   - custom: User-defined tags
name: Publish Container
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      container-file:
        description: "Containerfile path"
        required: false
        default: "Containerfile"
        type: string
      context:
        description: "Build context directory"
        required: false
        default: "."
        type: string
      branch:
        description: "Branch to checkout (default: main)"
        required: false
        default: "main"
        type: string
      platforms:
        description: "Comma-separated list of platforms to build"
        required: false
        default: "linux/amd64"
        type: string
      artifact-types:
        description: "Comma-separated artifact types (maven,npm,gradle)"
        required: true
        type: string
      enable-slsa:
        description: "Generate SLSA provenance"
        required: false
        default: true
        type: boolean
      enable-sbom:
        description: "Generate and attach SBOM"
        required: false
        default: true
        type: boolean
      enable-scan:
        description: "Enable vulnerability scanning"
        required: false
        default: true
        type: boolean
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      image-name:
        description: "Custom image name (defaults to repository name)"
        required: false
        type: string
      build-args:
        description: "Build arguments (KEY=VALUE format, one per line)"
        required: false
        type: string
      build-secrets:
        description: "Build secrets to pass (KEY=VALUE format, one per line)"
        required: false
        type: string
      push-image:
        description: "Push image to registry"
        required: false
        default: true
        type: boolean
      cache-from:
        description: "Cache sources for build"
        required: false
        default: "type=gha"
        type: string
      cache-to:
        description: "Cache destinations for build"
        required: false
        default: "type=gha,mode=max"
        type: string
      egress-policy:
        description: "Egress policy for the Harden Runner step"
        required: false
        default: "audit"
        type: string
      registry-username:
        description: "Registry username (defaults to github.actor for GHCR)"
        required: false
        type: string
      use-github-token:
        description: "Use GITHUB_TOKEN for authentication (GHCR only)"
        required: false
        default: true
        type: boolean
      enforce-namespace:
        description: "Enforce namespace validation (defaults to repository owner)"
        required: false
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
    secrets:
      registry-password:
        description: "Registry password/token (required when use-github-token=false)"
        required: false
    outputs:
      image:
        description: "Full image name with registry"
        value: ${{ jobs.build-and-push.outputs.image }}
      digest:
        description: "Image digest"
        value: ${{ jobs.build-and-push.outputs.digest }}
      metadata:
        description: "Image metadata JSON"
        value: ${{ jobs.build-and-push.outputs.metadata }}
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  build-and-push:
    name: Build and Push Container
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write # Required for SLSA provenance
      attestations: write # Required for SBOM attestation
      security-events: write # Required for security scanning
      actions: read # Required for SLSA provenance v2
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      metadata: ${{ steps.metadata.outputs.json }}
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.branch }}
      - name: Checkout .github repository for scripts
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Download Maven artifacts
        if: &if_has_maven_artifacts ${{ contains(inputs['artifact-types'], 'maven') }}
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        continue-on-error: true
        with:
          name: maven-build-artifacts
          path: ./
      - name: Verify Maven artifacts
        if: *if_has_maven_artifacts
        run: bash .github-shared/scripts/container/validate-artifacts.sh maven target
      - name: Download NPM artifacts
        if: &if_has_npm_artifacts ${{ contains(inputs['artifact-types'], 'npm') }}
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        continue-on-error: true
        with:
          name: npm-build-artifacts
          path: ./
      - name: Extract NPM tarball
        if: *if_has_npm_artifacts
        run: bash .github-shared/scripts/container/extract-npm-tarball.sh
      - name: Verify NPM artifacts
        if: *if_has_npm_artifacts
        run: bash .github-shared/scripts/container/validate-artifacts.sh npm dist "${{ inputs.context }}/${{ inputs['container-file'] }}"
      - name: Download Gradle artifacts
        if: &if_has_gradle_artifacts ${{ contains(inputs['artifact-types'], 'gradle') }}
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        continue-on-error: true
        with:
          name: gradle-build-artifacts
          path: build/libs/
      - name: Verify Gradle artifacts
        if: *if_has_gradle_artifacts
        run: bash .github-shared/scripts/container/validate-artifacts.sh gradle build/libs
      - name: Verify Containerfile
        id: containerfile
        run: bash .github-shared/scripts/container/validate-containerfile.sh "${{ inputs['container-file'] }}"
      - name: Set up QEMU
        if: contains(inputs.platforms, ',') || contains(inputs.platforms, 'arm')
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - name: Check registry authentication configuration
        if: &if_push_image ${{ inputs['push-image'] }}
        env:
          USE_GITHUB_TOKEN: ${{ inputs['use-github-token'] }}
          TARGET_REGISTRY: ${{ inputs.registry }}
          GITHUB_REGISTRY: ghcr.io
          REGISTRY_PASSWORD: ${{ secrets['registry-password'] }}
          VALIDATE_AUTH_SCRIPT: .github-shared/scripts/registry/validate-auth.sh
        run: bash .github-shared/scripts/registry/validate-auth-configuration.sh
      - name: Log in to Container Registry
        if: *if_push_image
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs['registry-username'] || github.actor }}
          password: ${{ inputs['use-github-token'] && secrets.GITHUB_TOKEN || secrets['registry-password'] }}
      - name: Determine Image Name
        id: image-name
        run: |
          bash .github-shared/scripts/container/resolve-image-name.sh \
            "${{ inputs.registry }}" \
            "${{ inputs['image-name'] }}" \
            "${{ github.repository }}" \
            "${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
      - name: Validate Image Namespace
        if: *if_push_image
        run: |
          bash .github-shared/scripts/container/validate-namespace.sh \
            "${{ steps.image-name.outputs.name }}" \
            "${{ github.repository }}" \
            "${{ inputs.registry }}" \
            "${{ inputs['enforce-namespace'] || github.repository_owner }}"
      - name: Extract Image Metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.image-name.outputs.name }}
          flavor: |
            latest=false
          tags: |
            # Always include the ref as-is (branch name, tag name, or PR number)
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

            # For version tags only (v1.0.0, v2.3.4, etc)
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}

            # For stable versions only (no dash in tag name like -beta, -rc)
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

            # SHA-based tags for non-tag refs (branches, PRs) for traceability
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type != 'tag' }}
      - name: Build Container Image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.containerfile.outputs.containerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs['push-image'] }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: ${{ inputs['cache-from'] }}
          cache-to: ${{ inputs['cache-to'] }}
          build-args: ${{ inputs['build-args'] }}
          secrets: ${{ inputs['build-secrets'] }}
          provenance: ${{ inputs['enable-slsa'] && 'mode=max' || 'false' }}
          sbom: ${{ inputs['enable-sbom'] }}
      - name: Check SLSA compatibility
        if: ${{ inputs['push-image'] && inputs['enable-slsa'] && inputs.registry != 'ghcr.io' }}
        run: |
          printf "::notice::SLSA provenance generation only supports ghcr.io registry\n"
          printf "::notice::Current registry: %s\n" "${{ inputs.registry }}"
          printf "::notice::SLSA provenance attestation will be skipped\n"
          printf "::notice::To enable SLSA: Use registry: ghcr.io or set enable-slsa: false\n"
      - name: Export digest
        if: &if_push_image_slsa_ghcr ${{ inputs['push-image'] && inputs['enable-slsa'] && inputs.registry == 'ghcr.io' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        if: *if_push_image_slsa_ghcr
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: digests-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Scan Container Image
        if: &if_scan_enabled ${{ inputs['enable-scan'] && inputs['push-image'] }}
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
        with:
          image-ref: ${{ steps.image-name.outputs.name }}@${{ steps.build.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'
      - name: Upload Trivy scan results
        if: *if_scan_enabled
        uses: github/codeql-action/upload-sarif@1b168cd39490f61582a9beae412bb7057a6b2c4e # v4.31.8
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-scan'
      - name: Generate Container SBOMs (SPDX + CycloneDX)
        if: &if_sbom_enabled ${{ inputs['enable-sbom'] && inputs['push-image'] }}
        env:
          ARTIFACT_TYPES: ${{ inputs['artifact-types'] }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IMAGE_NAME: ${{ steps.image-name.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SBOM_SCRIPT_ROOT: .github-shared/scripts/sbom
        run: bash .github-shared/scripts/sbom/generate-container-sbom-artifacts.sh
      - name: Upload Container SBOMs
        if: *if_sbom_enabled
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: container-sbom-${{ github.run_id }}
          path: |
            *-container-sbom.spdx.json
            *-container-sbom.cyclonedx.json
          retention-days: 30
      - name: Find Container SBOM file
        if: &if_sbom_and_slsa_enabled ${{ inputs['enable-sbom'] && inputs['push-image'] && inputs['enable-slsa'] }}
        id: find-sbom
        run: bash .github-shared/scripts/sbom/find-container-sbom.sh
      - name: Attest Container SBOM
        if: *if_sbom_and_slsa_enabled
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3.0.0
        with:
          subject-name: ${{ steps.image-name.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ steps.find-sbom.outputs.sbom-file }}
          push-to-registry: true
      - name: Output image details
        id: image
        env:
          IMAGE_NAME: ${{ steps.image-name.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_METADATA: ${{ steps.metadata.outputs.json }}
        run: bash .github-shared/scripts/container/write-image-details.sh
  # Generate SLSA provenance (called as separate job if enabled)
  provenance:
    needs: [build-and-push]
    if: ${{ inputs['push-image'] && inputs['enable-slsa'] && startsWith(github.ref, 'refs/tags/') && inputs.registry == 'ghcr.io' }}
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build-and-push.outputs.image }}
      digest: ${{ needs.build-and-push.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
