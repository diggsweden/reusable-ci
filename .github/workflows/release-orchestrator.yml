# Release Orchestrator
# 
# Purpose: Main orchestrator workflow that coordinates the complete release process for
# production releases. It handles version management, artifact publishing, container 
# building, security attestations, and GitHub release creation in a single workflow.
#
# How it works:
# 1. Validates release prerequisites (version match, credentials, permissions)
# 2. Bumps version and generates changelog using git-cliff
# 3. Publishes artifacts to configured registries (Maven Central, NPM, GitHub Packages)
# 4. Builds and publishes container images with SLSA/SBOM if configured
# 5. Creates GitHub release with changelog, artifacts, and signatures
#
# Security controls:
# - GPG signing of all artifacts (if signatures: true)
# - SLSA provenance attestation for supply chain security
# - SBOM generation in multiple formats (CycloneDX, SPDX)
# - Container vulnerability scanning with Trivy
# - License compliance checking
#
# Required Secrets (depending on configuration):
#   GITHUB_TOKEN: Automatically provided for GitHub operations
#   GPG_SECRET_KEY: For artifact signing (if signatures enabled)
#   GPG_PASSPHRASE: For artifact signing (if signatures enabled)
#   MAVEN_CENTRAL_USERNAME: For Maven Central publishing (when publish-to includes maven-central)
#   MAVEN_CENTRAL_PASSWORD: For Maven Central publishing (when publish-to includes maven-central)
#   NPM_TOKEN: For NPM registry publishing (npm packages)
#
# Required Permissions:
#   contents: write       # Create releases and tags
#   packages: write       # Publish packages and containers
#   id-token: write      # OIDC for attestations
#   attestations: write  # Attach SBOMs
#   security-events: write # Upload scan results
#   actions: read        # Read workflow for SLSA
#
# v3 Design
# - Removed single-artifact inline mode
# - Only supports artifactsConfig file
# - Separate artifacts[] and containers[] sections
# - Container configuration moved to containers[] section
#
# Build Types: application (default), library
# Publishing: Controlled via build-type, require-authorization, publish-to fields
# Containers: Separate section with explicit dependencies
name: Release Orchestrator
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      # === REQUIRED: artifacts.yml FILE ===
      artifacts-config:
        description: "Path to artifacts config file (required, e.g., .github/artifacts.yml)"
        required: true
        type: string
      # === SHARED CONFIGURATION ===
      release-type:
        description: "Release type: stable, prerelease (auto-detected from tag if not specified)"
        required: false
        type: string
      branch:
        description: "Branch to work with (default: main)"
        required: false
        default: "main"
        type: string
      # Changelog creator configuration
      changelog-creator:
        description: "Changelog creator type (e.g., git-cliff). Leave empty to skip"
        required: false
        default: "git-cliff"
        type: string
      changelog.config:
        description: "Changelog configuration file (default: uses generate-changelog default)"
        required: false
        default: ""
        type: string
      changelog.skipversionbump:
        description: "Skip version bump (default: false)"
        required: false
        default: false
        type: boolean
      # Release publisher configuration  
      release-publisher:
        description: "Release publisher type (github-cli). Leave empty to skip GitHub release"
        required: false
        type: string
      release.generatesbom:
        description: "Generate SBOM for release (default: true)"
        required: false
        default: true
        type: boolean
      release.attachartifacts:
        description: "Glob patterns for artifacts to attach to GitHub release (comma/newline separated)"
        required: false
        default: ""
        type: string
      release.signartifacts:
        description: "GPG sign release artifacts (default: true)"
        required: false
        default: true
        type: boolean
      release.checkauthorization:
        description: "Check if user is authorized for non-SNAPSHOT releases"
        required: false
        default: false
        type: boolean
        # Note: Typically set to true for public libraries publishing to Maven Central
      release.draft:
        description: "Create as draft release (default: false)"
        required: false
        default: false
        type: boolean
      # Advanced configuration
      working-directory:
        description: "Working directory for operations"
        required: false
        default: "."
        type: string
      file-pattern:
        description: "Files to commit in version bump (auto-detected by project type if not specified)"
        required: false
        type: string
        default: ""
        # Auto-detected patterns by project type:
        # - Maven: CHANGELOG.md pom.xml
        # - NPM: CHANGELOG.md package.json package-lock.json
        # - Gradle: CHANGELOG.md build.gradle settings.gradle
        # - Gradle Android: CHANGELOG.md build.gradle settings.gradle gradle.properties
        # - Xcode iOS: CHANGELOG.md project.pbxproj
      reusable-ci-ref:
        description: "Ref for reusable-ci scripts checkout (for testing feature branches)"
        required: false
        default: "main"
        type: string
concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false # Queue releases, don't cancel partial releases
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  # ===== Stage 0: Configuration And Policy =====
  parse-config:
    name: Parse Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # Parsed release inputs.
      artifacts: ${{ steps.parse.outputs.artifacts }}
      containers: ${{ steps.parse.outputs.containers }}

      # Primary artifact metadata used by validation and release creation.
      first-project-type: ${{ steps.parse.outputs.first-project-type }}
      first-build-type: ${{ steps.parse.outputs.first-build-type }}
      first-require-authorization: ${{ steps.parse.outputs.first-require-authorization }}
      first-artifact-name: ${{ steps.parse.outputs.first-artifact-name }}

      # Ecosystem artifact groups.
      maven-artifacts: ${{ steps.parse.outputs.maven-artifacts }}
      npm-artifacts: ${{ steps.parse.outputs.npm-artifacts }}
      gradle-artifacts: ${{ steps.parse.outputs.gradle-artifacts }}
      gradleandroid-artifacts: ${{ steps.parse.outputs.gradleandroid-artifacts }}
      xcodeios-artifacts: ${{ steps.parse.outputs.xcodeios-artifacts }}
      python-artifacts: ${{ steps.parse.outputs.python-artifacts }}
      go-artifacts: ${{ steps.parse.outputs.go-artifacts }}
      rust-artifacts: ${{ steps.parse.outputs.rust-artifacts }}

      # Ecosystem presence flags for stage gating.
      has-maven: ${{ steps.parse.outputs.has-maven }}
      has-npm: ${{ steps.parse.outputs.has-npm }}
      has-gradle: ${{ steps.parse.outputs.has-gradle }}
      has-gradleandroid: ${{ steps.parse.outputs.has-gradleandroid }}
      has-xcodeios: ${{ steps.parse.outputs.has-xcodeios }}
      has-python: ${{ steps.parse.outputs.has-python }}
      has-go: ${{ steps.parse.outputs.has-go }}
      has-rust: ${{ steps.parse.outputs.has-rust }}

      # Publish-target artifact groups and flags.
      mavencentral-artifacts: ${{ steps.parse.outputs.mavencentral-artifacts }}
      githubpackages-artifacts: ${{ steps.parse.outputs.githubpackages-artifacts }}
      googleplay-artifacts: ${{ steps.parse.outputs.googleplay-artifacts }}
      has-mavencentral: ${{ steps.parse.outputs.has-mavencentral }}
      has-githubpackages: ${{ steps.parse.outputs.has-githubpackages }}
      has-googleplay: ${{ steps.parse.outputs.has-googleplay }}

      # Parsed SBOM settings.
      needs-sbom: ${{ steps.parse.outputs.needs-sbom }}
      sbom-artifacts: ${{ steps.parse.outputs.sbom-artifacts }}

      # Preferred control-plane interface payloads for top-level stage wiring.
      release-context-json: ${{ steps.interface.outputs.release-context-json }}
      release-policy-json: ${{ steps.interface.outputs.release-policy-json }}

      # Normalized release-policy decisions retained for stage-internal routing.
      should-make-latest: ${{ steps.plan.outputs.should-make-latest }}
      has-containers: ${{ steps.plan.outputs.has-containers }}
      should-generate-sbom: ${{ steps.plan.outputs.should-generate-sbom }}
      should-sign-artifacts: ${{ steps.plan.outputs.should-sign-artifacts }}
      should-create-github-release: ${{ steps.plan.outputs.should-create-github-release }}
      should-check-authorization: ${{ steps.plan.outputs.should-check-authorization }}
      should-run-version-bump: ${{ steps.plan.outputs.should-run-version-bump }}
      should-create-draft-release: ${{ steps.plan.outputs.should-create-draft-release }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.branch }}
      - name: Checkout reusable-ci helper scripts
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs.reusable-ci-ref }}
          path: .github-shared

      - name: Install yq for config parsing
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Parse artifacts.yml
        id: parse
        run: bash .github-shared/scripts/config/parse-artifacts-config.sh
        env:
          ARTIFACTS_CONFIG: ${{ inputs['artifacts-config'] }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Normalize release-policy decisions
        id: plan
        env:
          # Explicit workflow-call inputs.
          RELEASE_TYPE: ${{ inputs['release-type'] }}
          RELEASE_PUBLISHER: ${{ inputs['release-publisher'] }}
          RELEASE_CHECK_AUTHORIZATION: ${{ inputs['release.checkauthorization'] }}
          RELEASE_DRAFT: ${{ inputs['release.draft'] }}
          RELEASE_GENERATE_SBOM: ${{ inputs['release.generatesbom'] }}
          RELEASE_SIGN_ARTIFACTS: ${{ inputs['release.signartifacts'] }}
          CHANGELOG_CREATOR: ${{ inputs['changelog-creator'] }}
          CHANGELOG_SKIP_VERSION_BUMP: ${{ inputs['changelog.skipversionbump'] }}

          # Parsed config inputs needed for policy normalization.
          GITHUB_REF_NAME: ${{ github.ref_name }}
          NEEDS_SBOM: ${{ steps.parse.outputs.needs-sbom }}
          FIRST_REQUIRE_AUTHORIZATION: ${{ steps.parse.outputs.first-require-authorization }}
          CONTAINERS: ${{ steps.parse.outputs.containers }}
        run: bash .github-shared/scripts/plan/resolve-release-plan.sh

      - name: Compose release control-plane interface
        id: interface
        env:
          FIRST_PROJECT_TYPE: ${{ steps.parse.outputs.first-project-type }}
          FIRST_BUILD_TYPE: ${{ steps.parse.outputs.first-build-type }}
          FIRST_ARTIFACT_NAME: ${{ steps.parse.outputs.first-artifact-name }}
          SHOULD_SIGN_ARTIFACTS: ${{ steps.plan.outputs.should-sign-artifacts }}
          SHOULD_CHECK_AUTHORIZATION: ${{ steps.plan.outputs.should-check-authorization }}
          SHOULD_RUN_VERSION_BUMP: ${{ steps.plan.outputs.should-run-version-bump }}
          SHOULD_CREATE_GITHUB_RELEASE: ${{ steps.plan.outputs.should-create-github-release }}
          SHOULD_CREATE_DRAFT_RELEASE: ${{ steps.plan.outputs.should-create-draft-release }}
          SHOULD_GENERATE_SBOM: ${{ steps.plan.outputs.should-generate-sbom }}
          SHOULD_MAKE_LATEST: ${{ steps.plan.outputs.should-make-latest }}
          HAS_CONTAINERS: ${{ steps.plan.outputs.has-containers }}
        run: bash .github-shared/scripts/plan/write-release-interface.sh
  # ===== Stage 1: Validation =====
  validate-prerequisites:
    name: Validate Prerequisites
    needs: [parse-config]
    secrets: inherit
    uses: ./.github/workflows/validate-release-prerequisites.yml
    with:
      project-type: ${{ fromJson(needs.parse-config.outputs['release-context-json']).project_type }}
      build-type: ${{ fromJson(needs.parse-config.outputs['release-context-json']).build_type }}
      container-registry: ghcr.io
      sign-artifacts: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).sign_artifacts }}
      check-authorization: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).check_authorization }}
      branch: ${{ inputs.branch }}
      reusable-ci-ref: ${{ inputs.reusable-ci-ref }}
  # ===== Stage 2: Release Preparation =====
  # Release preparation now lives below this control-plane stage call.
  execute-prepare-stage:
    name: Execute Prepare Stage
    needs: [parse-config, validate-prerequisites]
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/release-prepare-stage.yml
    with:
      branch: ${{ inputs.branch }}
      reusable-ci-ref: ${{ inputs.reusable-ci-ref }}
      artifacts: ${{ needs.parse-config.outputs.artifacts }}
      should-run-version-bump: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).run_version_bump }}
      file-pattern: ${{ inputs['file-pattern'] }}
  # ===== Stage 3: Build =====
  # Build fanout now lives below this control-plane stage call.
  execute-build-stage:
    name: Execute Build Stage
    needs: [parse-config, execute-prepare-stage]
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/release-build-stage.yml
    with:
      branch: ${{ inputs.branch }}
      reusable-ci-ref: ${{ inputs.reusable-ci-ref }}
      maven-artifacts: ${{ needs.parse-config.outputs.maven-artifacts }}
      npm-artifacts: ${{ needs.parse-config.outputs.npm-artifacts }}
      gradle-artifacts: ${{ needs.parse-config.outputs.gradle-artifacts }}
      gradleandroid-artifacts: ${{ needs.parse-config.outputs.gradleandroid-artifacts }}
      xcodeios-artifacts: ${{ needs.parse-config.outputs.xcodeios-artifacts }}
  # ===== Stage 4: Publish =====
  # Publish fanout now lives below this control-plane stage call.
  execute-publish-stage:
    name: Execute Publish Stage
    needs: [parse-config, execute-build-stage]
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/release-publish-stage.yml
    with:
      branch: ${{ inputs.branch }}
      reusable-ci-ref: ${{ inputs.reusable-ci-ref }}
      xcodeios-artifacts: ${{ needs.parse-config.outputs.xcodeios-artifacts }}
      githubpackages-artifacts: ${{ needs.parse-config.outputs.githubpackages-artifacts }}
      mavencentral-artifacts: ${{ needs.parse-config.outputs.mavencentral-artifacts }}
      googleplay-artifacts: ${{ needs.parse-config.outputs.googleplay-artifacts }}
      containers: ${{ needs.parse-config.outputs.containers }}
      build-result-json: ${{ needs.execute-build-stage.outputs.result-json }}
  # ===== Stage 5: Release =====
  # Release creation stays top-level because it is the public end of the pipeline.
  create-release:
    name: Create GitHub Release
    needs: [parse-config, execute-publish-stage]
    # Run even if previous jobs were skipped but at least one succeeded
    if: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).create_github_release }}
    permissions:
      contents: write
      packages: read
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/release-create-github.yml
    with:
      release-name: "${{ github.ref_name }}"
      checkout-ref: ${{ inputs.branch }}
      attach-artifacts: ${{ inputs['release.attachartifacts'] }}
      generate-sbom: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).generate_sbom }}
      sign-artifacts: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).sign_artifacts }}
      draft: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).create_draft_release }}
      project-type: ${{ fromJson(needs.parse-config.outputs['release-context-json']).project_type }}
      artifact-name: ${{ fromJson(needs.parse-config.outputs['release-context-json']).artifact_name }}
      reusable-ci-ref: ${{ inputs.reusable-ci-ref }}
      changelog-config: ${{ inputs['changelog.config'] }}
      make-latest: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).make_latest }}
      has-containers: ${{ fromJson(needs.parse-config.outputs['release-policy-json']).has_containers }}
  # ===== Stage 6: Summary =====
  release-summary:
    name: Release Summary
    needs:
      - parse-config
      - execute-prepare-stage
      - execute-build-stage
      - execute-publish-stage
      - create-release
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 1
      - name: Generate Release Summary
        env:
          # Release context.
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_BRANCH: ${{ inputs.branch }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_ACTOR: ${{ github.actor }}

          # Release preparation result.
          PREPARE_STAGE_RESULT_JSON: ${{ needs.execute-prepare-stage.outputs.result-json }}

          # Build-stage results.
          BUILD_STAGE_RESULT_JSON: ${{ needs.execute-build-stage.outputs.result-json }}

          # Publish-stage results.
          PUBLISH_STAGE_RESULT_JSON: ${{ needs.execute-publish-stage.outputs.result-json }}

          # Release-stage result.
          CREATE_RELEASE_RESULT: ${{ needs.create-release.result }}
        run: bash scripts/summary/write-release-summary.sh
