# Release Dev Orchestrator
# 
# Purpose: Lightweight orchestrator for development builds. Provides fast
# feedback loops during development by skipping production security features while
# maintaining basic functionality for testing and development environments.
#
# How it works:
# 1. Triggers on pushes to development branches (develop, feature/*)
# 2. Builds the project (Maven or NPM)
# 3. Creates container image with dev tag
# 4. Optionally publishes NPM package to GitHub Packages (dev tag)
# 5. Skips all production features (SLSA, SBOM, signing, releases)
#
# Security controls:
# - Minimal - focused on speed over security for development
# - Images/packages clearly marked with -dev suffix
# - No production attestations or signing
#
# Registry Authentication:
#   GitHub Packages (default): Uses GITHUB_TOKEN (no secrets needed)
#   Other registries: Set use-ci-token=false and provide registry-password secret
#
# Required Secrets:
#   registry-password: Required when use-ci-token=false (for npmjs.org, etc)
#
# Required Permissions:
#   contents: read   # Read source code
#   packages: write  # Push images to ghcr.io and packages to GitHub Packages
#
# Differences from Production:
#   - Dev tags (0.5.9-dev-feat-name-abc1234) vs version tags
#   - No SLSA attestation
#   - No SBOM generation
#   - No vulnerability scanning
#   - No artifact signing
#   - No GitHub release
#   - ~3-5 min vs ~12-15 min build time
name: Orchestrate Dev Release
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      project-type:
        description: "Project type: maven, npm"
        required: true
        type: string
      container-file:
        description: "Containerfile path"
        required: false
        default: "Containerfile"
        type: string
      registry:
        description: "Container registry"
        required: false
        default: "ghcr.io"
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      java-version:
        description: "Java version (for maven/gradle)"
        required: false
        default: "25"
        type: string
      node-version:
        description: "Node.js version (for npm)"
        required: false
        default: "24"
        type: string
      publish-npm:
        description: "Publish NPM package to registry (npm projects only)"
        required: false
        default: true
        type: boolean
      npm-registry:
        description: "NPM registry URL"
        required: false
        default: "https://npm.pkg.github.com"
        type: string
      package-scope:
        description: "Required NPM package scope (e.g., @diggsweden)"
        required: false
        default: ""
        type: string
      npm-registry-username:
        description: "NPM registry username (defaults to github.actor for GitHub Packages)"
        required: false
        type: string
      use-ci-token:
        description: "Use GITHUB_TOKEN for NPM authentication (GitHub Packages only)"
        required: false
        default: true
        type: boolean
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
    secrets:
      registry-password:
        description: "NPM registry auth token (required when use-ci-token=false)"
        required: false
    outputs:
      container-image:
        description: "Published container image"
        value: ${{ fromJson(jobs.execute-dev-publish-stage.outputs['artifacts-json'] || '{}').container_image }}
      container-digest:
        description: "Container image digest"
        value: ${{ fromJson(jobs.execute-dev-publish-stage.outputs['artifacts-json'] || '{}').container_digest }}
      npm-package-name:
        description: "Published NPM package name (if published)"
        value: ${{ fromJson(jobs.execute-dev-publish-stage.outputs['artifacts-json'] || '{}').npm_package_name }}
      npm-package-version:
        description: "Published NPM package version (if published)"
        value: ${{ fromJson(jobs.execute-dev-publish-stage.outputs['artifacts-json'] || '{}').npm_package_version }}
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  # ===== Stage 0: Dev Context =====
  # Compose the small control-plane payloads that later dev stages consume.
  compose-dev-interface:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dev-context-json: ${{ steps.interface.outputs.dev-context-json }}
      dev-policy-json: ${{ steps.interface.outputs.dev-policy-json }}
    steps:
      - name: Checkout reusable-ci helper scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Compose dev control-plane interface
        id: interface
        env:
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          BRANCH: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_ACTOR: ${{ github.actor }}
          RELEASE_REPOSITORY: ${{ github.repository }}
          WORKING_DIRECTORY: ${{ inputs['working-directory'] }}
          JAVA_VERSION: ${{ inputs['java-version'] }}
          NODE_VERSION: ${{ inputs['node-version'] }}
          CONTAINER_FILE: ${{ inputs['container-file'] }}
          REGISTRY: ${{ inputs.registry }}
          REUSABLE_CI_REF: ${{ inputs['reusable-ci-ref'] }}
          NPM_REGISTRY: ${{ inputs['npm-registry'] }}
          PACKAGE_SCOPE: ${{ inputs['package-scope'] }}
          NPM_REGISTRY_USERNAME: ${{ inputs['npm-registry-username'] }}
          PUBLISH_NPM: ${{ inputs['publish-npm'] }}
          USE_CI_TOKEN: ${{ inputs['use-ci-token'] }}
        run: bash .github-shared/scripts/plan/write-dev-release-interface.sh

  # ===== Stage 1: Build =====
  execute-dev-build-stage:
    name: Build
    needs: [compose-dev-interface]
    permissions:
      contents: read
    uses: ./.github/workflows/release-dev-build-stage.yml
    with:
      dev-context-json: ${{ needs.compose-dev-interface.outputs.dev-context-json }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}

  # ===== Stage 2: Publish =====
  execute-dev-publish-stage:
    name: Publish
    needs: [compose-dev-interface, execute-dev-build-stage]
    if: ${{ !failure() && !cancelled() }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/release-dev-publish-stage.yml
    with:
      dev-context-json: ${{ needs.compose-dev-interface.outputs.dev-context-json }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
      dev-policy-json: ${{ needs.compose-dev-interface.outputs.dev-policy-json }}
      build-result-json: ${{ needs.execute-dev-build-stage.outputs.result-json }}

  # ===== Stage 3: Summary =====
  dev-release-summary:
    name: Summary
    needs:
      - compose-dev-interface
      - execute-dev-build-stage
      - execute-dev-publish-stage
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Generate Dev Release Summary
        env:
          # Dev release context.
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          RELEASE_REF: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_ACTOR: ${{ github.actor }}
          RELEASE_REPOSITORY: ${{ github.repository }}

          # Stage results and published artifacts.
          BUILD_STAGE_RESULT_JSON: ${{ needs.execute-dev-build-stage.outputs.result-json }}
          PUBLISH_STAGE_RESULT_JSON: ${{ needs.execute-dev-publish-stage.outputs.result-json }}
          DEV_ARTIFACTS_JSON: ${{ needs.execute-dev-publish-stage.outputs.artifacts-json }}
        run: bash .github-shared/scripts/summary/write-dev-release-summary.sh
