# GitHub Release Creator
# 
# Purpose: Creates GitHub releases with  security features including
# artifact signing, SBOM generation, and checksum calculation using GitHub CLI.
#
# How it works:
# 1. Downloads all artifacts from the workflow run
# 2. Generates checksums (SHA-256) for all artifacts
# 3. Creates SBOM in multiple formats (CycloneDX, SPDX) if enabled
# 4. Signs artifacts with GPG if configured
# 5. Creates GitHub release with changelog using gh CLI
# 6. Uploads all artifacts, checksums, signatures, and SBOMs to release
#
# Security controls:
# - GPG signing of all release artifacts
# - Checksum generation for integrity verification
# - SBOM for supply chain transparency
# - Support for attestation attachment
#
# Required Secrets:
#   GPG_SECRET_KEY: For artifact signing (if sign-artifacts: true)
#   GPG_PASSPHRASE: For artifact signing (if sign-artifacts: true)
#   GITHUB_TOKEN: For release creation (automatic)
#
# Required Permissions:
#   contents: write      # Create releases
#   attestations: write  # Attach attestations (optional)
#
# Generated Files:
#   - checksums.sha256: SHA-256 checksums for all artifacts
#   - *.sig: GPG signatures for each artifact
#   - sbom.json: CycloneDX/SPDX Software Bill of Materials
name: Create GitHub Release
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      release-name:
        description: "Release title shown in GitHub Releases"
        required: false
        default: ""
        type: string
      checkout-ref:
        description: "Git ref to checkout (branch or tag)"
        required: false
        default: "main"
        type: string
      attach-artifacts:
        description: "Glob patterns for artifacts to attach (newline or comma separated)"
        required: false
        type: string
      sboms:
        description: "SBOMs to generate and attach: all | none | comma-list of build,analyzed-artifact,analyzed-container (default: all)"
        required: false
        default: "all"
        type: string
      sign-artifacts:
        description: "GPG sign all artifacts"
        required: false
        default: true
        type: boolean
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      project-type:
        description: "Project type (maven, npm, gradle, python, etc.)"
        required: false
        default: "maven"
        type: string
      changelog-config:
        description: "Path to changelog configuration file"
        required: false
        default: ".github-templates/templates/gitcliff/default.toml"
        type: string
      make-latest:
        description: "Mark as latest release (true, false, legacy)"
        required: false
        default: "true"
        type: string
      egress-policy:
        description: "Egress policy for the Harden Runner step"
        required: false
        default: "audit"
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
      has-containers:
        description: "Whether containers were built (to determine if container SBOMs exist)"
        required: false
        default: false
        type: boolean
      artifact-name:
        description: "Artifact name for SBOM generation (e.g., 'token-lib-ci' for Maven artifactId). If not provided, uses repository name."
        required: false
        type: string
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  generate-changelog:
    name: Generate Release Changelog
    permissions:
      contents: read
    uses: ./.github/workflows/generate-changelog.yml
    with:
      branch: ${{ inputs['checkout-ref'] }}
      git-cliff-args: "--latest"
      output-file: "ReleasenotesTmp"
      upload-as-artifact: true
      artifact-name: "release-changelog"
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
  create-release:
    name: Create GitHub Release
    needs: [generate-changelog]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: read
      id-token: write
    steps:
      - name: Harden GitHub runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: ${{ inputs.egress-policy }}
      - name: Checkout repository with moved tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs['checkout-ref'] }}
          fetch-tags: true
      - name: Import GPG key
        if: &if_sign_artifacts ${{ inputs['sign-artifacts'] }}
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6.3.0
        with:
          gpg_private_key: ${{ secrets.OSPO_BOT_GPG_PRIV }}
          passphrase: ${{ secrets.OSPO_BOT_GPG_PASS }}
          git_user_signingkey: true
      - name: Download Release Changelog
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: release-changelog
      # Download analyzed-container SBOM if it exists (from publish-container job)
      - name: Download Analyzed-Container SBOM artifacts
        if: ${{ inputs['has-containers'] && (contains(inputs.sboms, 'analyzed-container') || inputs.sboms == 'all') }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: analyzed-container-sbom-${{ github.run_id }}
          path: ./sbom-artifacts/
      - name: Checkout .github repo for release scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Determine artifact name
        id: artifact-name
        env:
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          # Gradle pairs its SBOM with the user-selected artifact-name from
          # artifacts.yml; pass it through so resolve-artifact-name.sh can
          # compute a matching sbom-name.
          ARTIFACT_NAME: ${{ inputs['artifact-name'] }}
        run: |
          bash .github-shared/scripts/release/resolve-artifact-name.sh \
            "$PROJECT_TYPE" >> "$GITHUB_OUTPUT"
      # Download build artifacts based on project type
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ./release-artifacts/
      # Build SBOM lives in its own artifact so a broken SBOM plugin can't
      # fail the code upload. Only needed when the `build` layer is in the
      # effective sboms — generate-sboms.sh reads the aggregate bom.json from
      # ./release-artifacts/.
      - name: Download Build SBOM
        if: ${{ contains(inputs.sboms, 'build') || inputs.sboms == 'all' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        continue-on-error: true
        with:
          name: ${{ steps.artifact-name.outputs.sbom-name }}
          path: ./release-artifacts/
      - name: Resolve release metadata
        id: release-metadata
        env:
          VERSION: ${{ github.ref_name }}
          ARTIFACT_NAME: ${{ inputs['artifact-name'] }}
          REPOSITORY: ${{ github.repository }}
        run: bash .github-shared/scripts/release/resolve-release-metadata.sh
      - name: Generate CISA-layer SBOMs
        if: &if_has_sboms ${{ inputs.sboms != 'none' }}
        env:
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          RELEASE_VERSION_NO_V: ${{ steps.release-metadata.outputs.version-no-v }}
          PROJECT_NAME: ${{ steps.release-metadata.outputs.project-name }}
          SBOMS: ${{ inputs.sboms }}
        run: |
          # analyzed-container is scanned separately at container-publish time
          # and the resulting BOM is already landed under ./sbom-artifacts/ —
          # pass only the artifact-level layers to generate-sboms.sh.
          layers=$(bash .github-shared/scripts/config/expand-sboms.sh \
            --format comma --exclude analyzed-container "$SBOMS")
          if [[ -n "$layers" ]]; then
            bash .github-shared/scripts/sbom/generate-sboms.sh \
              --project-type "$PROJECT_TYPE" \
              --layers "$layers" \
              --version "$RELEASE_VERSION_NO_V" \
              --name "$PROJECT_NAME"
          else
            printf "No artifact-level SBOM layers requested; analyzed-container (if any) is already downloaded.\n"
          fi
      - name: Generate checksums
        env:
          ATTACH_ARTIFACTS: ${{ inputs['attach-artifacts'] }}
        run: bash .github-shared/scripts/release/generate-checksums.sh
      - name: Sign artifacts
        if: *if_sign_artifacts
        env:
          GPG_KEY_ID: ${{ steps.import-gpg.outputs.keyid }}
        run: bash .github-shared/scripts/release/sign-release-artifacts.sh
      - name: Create SBOM ZIP
        if: *if_has_sboms
        env:
          SIGN_ARTIFACTS: ${{ inputs['sign-artifacts'] }}
          GPG_KEY_ID: ${{ steps.import-gpg.outputs.keyid }}
        run: >-
          bash .github-shared/scripts/release/create-sbom-zip.sh "${{ steps.release-metadata.outputs.project-name }}" "${{ steps.release-metadata.outputs.version }}"
      - name: Prepare release notes
        env:
          SOURCE_FILE: ReleasenotesTmp
          TARGET_FILE: release-notes.md
          RELEASE_VERSION: ${{ github.ref_name }}
          RELEASE_COMMIT: ${{ github.sha }}
        run: bash .github-shared/scripts/release/prepare-release-notes.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_NAME: ${{ inputs['release-name'] }}
          REPOSITORY: ${{ github.repository }}
          DRAFT: ${{ inputs.draft }}
          MAKE_LATEST: ${{ inputs['make-latest'] }}
          ATTACH_ARTIFACTS: ${{ inputs['attach-artifacts'] }}
          RELEASE_NOTES_FILE: release-notes.md
          ARTIFACT_NAME: ${{ inputs['artifact-name'] }}
        run: bash .github-shared/scripts/release/create-github-release.sh
      - name: Upload release artifacts summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts-${{ github.run_id }}
          path: |
            release-files/
            ReleasenotesTmp
            release-notes.md
          retention-days: 30
          if-no-files-found: ignore
