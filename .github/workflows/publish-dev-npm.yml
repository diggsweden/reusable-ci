# Development NPM Package Publisher
# 
# Purpose: Publishes pre-built npm packages for development and testing.
#
# Supported Registries:
# - GitHub Packages (npm.pkg.github.com) - Default, uses GITHUB_TOKEN
# - npmjs.org - Set use-ci-token=false, provide registry-password
# - Any custom npm registry
#
# How it works:
# 1. Downloads pre-built artifacts from build-npm.yml
# 2. Generates dev version: ${BASE_VERSION}-dev-${BRANCH}-${SHORT_SHA}
# 3. Checks if version already exists in registry (idempotent — same SHA = same content)
# 4. If already published: logs warning, skips remaining steps, exits successfully
# 5. Applies version to package.json (no git commit)
# 6. Creates npm pack tarball
# 7. Publishes to registry with 'dev' tag
# 8. Uploads tarball as workflow artifact
#
# Security controls:
# - Minimal - optimized for speed
# - Packages tagged with 'dev' not 'latest'
# - No SBOM, no signing, no attestation
#
# Dependencies:
# - Requires build-npm.yml to have run first
# - Downloads npm-build-artifacts
#
# Registry Authentication:
#   GitHub Packages (default): Uses GITHUB_TOKEN (no secrets needed)
#   Other registries: Set use-ci-token=false and provide registry-password secret
#
# Required Secrets:
#   registry-password: Required when use-ci-token=false (for npmjs.org, etc)
#
# Required Permissions:
#   contents: read
#   packages: write  # Only if publishing to GitHub Packages
#
# Outputs:
#   package-name: Published package name
#   package-version: Published dev version
#   tarball: Tarball filename
name: Publish Dev NPM
on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "24"
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      registry:
        description: "NPM registry URL"
        required: false
        default: "https://npm.pkg.github.com"
        type: string
      package-scope:
        description: "Required package scope (e.g., @diggsweden). Leave empty to skip validation."
        required: false
        default: ""
        type: string
      registry-username:
        description: "NPM registry username (defaults to github.actor for GitHub Packages)"
        required: false
        type: string
      use-ci-token:
        description: "Use GITHUB_TOKEN for authentication (GitHub Packages only)"
        required: false
        default: true
        type: boolean
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
    secrets:
      registry-password:
        description: "NPM registry auth token (required when use-ci-token=false)"
        required: false
    outputs:
      package-name:
        description: "Published package name"
        value: ${{ jobs.build-and-publish.outputs.package-name }}
      package-version:
        description: "Published dev version"
        value: ${{ jobs.build-and-publish.outputs.package-version }}
      tarball:
        description: "Tarball filename"
        value: ${{ jobs.build-and-publish.outputs.tarball }}
      publish-status:
        description: "Publish outcome: published or already-exists"
        value: ${{ jobs.build-and-publish.outputs.publish-status }}
permissions:
  contents: read
jobs:
  build-and-publish:
    name: Build & Publish Dev NPM Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      package-name: ${{ steps.meta.outputs.name }}
      package-version: ${{ steps.tags.outputs.dev_version }}
      tarball: ${{ steps.pack.outputs.tarball }}
      publish-status: ${{ steps.check-registry.outputs.already_published == 'true' && 'already-exists' || 'published' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Read package metadata
        id: meta
        working-directory: ${{ inputs.working-directory }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          printf "name=%s\n" "$NAME" >> "$GITHUB_OUTPUT"
          printf "Package name: %s\n" "$NAME"
      - name: Validate package scope
        if: ${{ inputs.package-scope != '' }}
        working-directory: ${{ inputs.working-directory }}
        env:
          PACKAGE_SCOPE: ${{ inputs.package-scope }}
          TARGET_REGISTRY: ${{ inputs.registry }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          SCOPE="$PACKAGE_SCOPE"
          if [[ "$NAME" != "${SCOPE}"/* ]]; then
            printf "::error::package.json name must be scoped as %s/<pkg>\n" "${SCOPE}"
            printf "Found: %s\n" "$NAME"
            exit 1
          fi
          # Configure scoped registry
          npm config set "${SCOPE}:registry" "$TARGET_REGISTRY"
      - name: Download NPM build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: npm-build-artifacts
          path: ${{ inputs.working-directory }}/
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Extract tarball contents
        working-directory: ${{ inputs.working-directory }}
        env:
          GITHUB_WORKSPACE_PATH: ${{ github.workspace }}
        run: bash "$GITHUB_WORKSPACE_PATH/.github-shared/scripts/publish/npm-validate-tarball.sh"
      - name: Check registry authentication configuration
        env:
          USE_CI_TOKEN: ${{ inputs['use-ci-token'] }}
          TARGET_REGISTRY: ${{ inputs.registry }}
          CI_REGISTRY: "https://npm.pkg.github.com"
          REGISTRY_PASSWORD: ${{ secrets['registry-password'] }}
        run: bash .github-shared/scripts/registry/validate-auth.sh
      - name: Generate dev version tag
        id: tags
        shell: bash
        run: |
          DEV_VERSION=$(bash .github-shared/scripts/version/generate-dev-version.sh)
          printf "dev_version=%s\n" "${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          printf "📦 Dev version: %s\n" "${DEV_VERSION}"
      - name: Check if version already published
        id: check-registry
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ inputs['use-ci-token'] && secrets.GITHUB_TOKEN || secrets['registry-password'] }}
          DEV_VERSION: ${{ steps.tags.outputs.dev_version }}
          TARGET_REGISTRY: ${{ inputs.registry }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${DEV_VERSION}" version --registry "$TARGET_REGISTRY" 2>/dev/null; then
            printf "::warning::Package %s@%s already exists in registry — skipping publish (same commit SHA)\n" \
              "${PKG_NAME}" "${DEV_VERSION}"
            printf "already_published=true\n" >> "$GITHUB_OUTPUT"
          else
            printf "Version %s not found in registry — will publish\n" "${DEV_VERSION}"
            printf "already_published=false\n" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply dev version to package.json
        if: steps.check-registry.outputs.already_published != 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          DEV_VERSION: ${{ steps.tags.outputs.dev_version }}
        run: |
          npm version "$DEV_VERSION" --no-git-tag-version --allow-same-version
          printf "Applied version: %s\n" "$(node -p "require('./package.json').version")"
      - name: Pack tarball
        if: steps.check-registry.outputs.already_published != 'true'
        id: pack
        working-directory: ${{ inputs.working-directory }}
        run: |
          printf "Running npm pack...\n"
          FILE=$(npm pack 2>&1 | tail -n 1)
          printf "tarball=%s\n" "$FILE" >> "$GITHUB_OUTPUT"
          printf "Created: %s\n" "$FILE"
      - name: Upload tarball as artifact
        if: steps.check-registry.outputs.already_published != 'true'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: npm-dev-package-${{ github.run_id }}
          path: ${{ inputs.working-directory }}/${{ steps.pack.outputs.tarball }}
          retention-days: 7
      - name: Publish to NPM registry
        if: steps.check-registry.outputs.already_published != 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ inputs['use-ci-token'] && secrets.GITHUB_TOKEN || secrets['registry-password'] }}
          TARGET_REGISTRY: ${{ inputs.registry }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          printf "Publishing %s@%s to %s with tag 'dev'\n" "${PKG_NAME}" "${PKG_VERSION}" "$TARGET_REGISTRY"
          npm publish --tag dev
          printf "✅ Published successfully\n"
