#
# Gradle JVM Builder
#
# Purpose: Builds Gradle JVM projects — libraries, applications, plugins —
# and uploads their JAR artifacts for subsequent publishing steps (Maven
# Central, container images, etc.).
#
# Android builds are handled by build-gradle-android.yml, which supports
# product flavors, AABs, Google Play artifact naming, and signing. This
# workflow is intentionally Android-free: no Android SDK setup, no APK/AAB
# globbing, no keystore decoding. Routing from artifacts.yml is by
# `project-type: gradle` (here) vs `project-type: gradle-android` (there).
#
# Build Process:
#   1. Set up JDK
#   2. Run the requested Gradle tasks
#   3. Generate a CycloneDX Build SBOM
#   4. Upload JAR artifacts and the build SBOM
#
# Required Permissions:
#   contents: read  # Checkout code
#
name: Build Gradle
on:
  workflow_call:
    inputs:
      java-version:
        description: "Java version"
        required: true
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      gradle-tasks:
        description: "Gradle tasks to run"
        required: false
        default: "assemble"
        type: string
      skip-tests:
        description: "Skip tests during build"
        required: false
        default: false
        type: boolean
      branch:
        description: "Branch to checkout"
        required: false
        default: "main"
        type: string
      artifact-name:
        description: "Artifact name for uploads (defaults to 'gradle-build-artifacts')"
        required: false
        default: ""
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  build-gradle:
    name: Build Gradle Project
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs['java-version'] }}
          cache: 'gradle'
      - name: Make gradlew executable
        working-directory: ${{ inputs['working-directory'] }}
        run: chmod +x ./gradlew
      - name: Get version info
        id: version-info
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          # JVM Gradle convention: `version=` in gradle.properties. Best-effort:
          # absence is a warning, not a failure — the consumer may carry version
          # in build.gradle(.kts) or an external source.
          if [ -f "gradle.properties" ] && grep -q '^version=' gradle.properties; then
            VERSION=$(grep '^version=' gradle.properties | head -1 | cut -d'=' -f2-)
            printf "VERSION=%s\n" "${VERSION}" >> "$GITHUB_OUTPUT"
            printf "Version: %s\n" "${VERSION}"
          else
            printf "::warning::version not found in gradle.properties\n"
          fi
      - name: Run Gradle build
        working-directory: ${{ inputs['working-directory'] }}
        env:
          GRADLE_TASKS: ${{ inputs['gradle-tasks'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
        run: |
          printf "Running Gradle tasks: %s\n" "$GRADLE_TASKS"
          # shellcheck disable=SC2086
          if [ "$SKIP_TESTS" = "true" ]; then
            ./gradlew $GRADLE_TASKS -x test
          else
            # shellcheck disable=SC2086
            ./gradlew $GRADLE_TASKS
          fi
      # Separate Gradle invocation keeps SBOM failures advisory (continue-on-error).
      # Injecting the plugin into the real build would make a build regression
      # cascade from an SBOM-tool problem, which is the wrong failure domain.
      - name: Generate Build SBOM
        id: sbom
        continue-on-error: true
        working-directory: ${{ inputs['working-directory'] }}
        env:
          # renovate: datasource=maven depName=org.cyclonedx:cyclonedx-gradle-plugin
          CYCLONEDX_GRADLE_VERSION: "3.2.1"
        run: bash "${{ github.workspace }}/.github-shared/scripts/sbom/build/gradle/generate-gradle-sbom.sh"
      - name: List built artifacts
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          printf "Built artifacts:\n"
          find . -type f -path '*/build/libs/*.jar' -ls 2>/dev/null || printf "No JAR files found\n"
      - name: Upload Gradle artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs['artifact-name'] || 'gradle-build-artifacts' }}
          # Root and subproject JARs. Single-module projects put jars under
          # `build/libs/`; multi-module projects put them under
          # `<subproject>/build/libs/`. Both globs cover the common layouts.
          path: |
            ${{ inputs['working-directory'] }}/build/libs/*.jar
            ${{ inputs['working-directory'] }}/**/build/libs/*.jar
          retention-days: 7
          if-no-files-found: error
      # SBOM artifact is paired with the build artifact name so parallel
      # matrix uploads (release-build-stage dispatches build-gradle per
      # artifact) don't collide on a single fixed SBOM name. Default falls
      # back to `gradle-build-sbom` when `artifact-name` is not overridden.
      # cyclonedx-gradle-plugin 3.x writes to build/reports/bom.json;
      # build/reports/cyclonedx/bom.json is retained for older plugin versions.
      - name: Upload Gradle Build SBOM
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs['artifact-name'] && format('{0}-sbom', inputs['artifact-name']) || 'gradle-build-sbom' }}
          path: |
            ${{ inputs['working-directory'] }}/build/reports/bom.json
            ${{ inputs['working-directory'] }}/**/build/reports/bom.json
            ${{ inputs['working-directory'] }}/build/reports/cyclonedx/bom.json
            ${{ inputs['working-directory'] }}/**/build/reports/cyclonedx/bom.json
          retention-days: 7
          if-no-files-found: warn
      - name: Write SBOM status to step summary
        if: always()
        env:
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          WORKDIR: ${{ inputs['working-directory'] }}
        run: |
          # shellcheck disable=SC2016  # backticks inside single quotes are intentional markdown
          {
            printf '### Build SBOM\n'
            if [[ "$SBOM_OUTCOME" == "success" ]]; then
              # Report the shallowest bom.json relative to the working dir.
              bom=$(find "$WORKDIR" -path '*/build/reports/bom.json' -o -path '*/build/reports/cyclonedx/bom.json' 2>/dev/null | sort | head -1)
              if [[ -n "$bom" ]]; then
                printf -- '- ✅ CycloneDX: `%s`\n' "$bom"
              else
                printf -- '- ⚠️ Generated but file not located — check plugin output path\n'
              fi
            else
              printf -- '- ⚠️ Generation step did not succeed (continued as advisory)\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate build summary
        env:
          JAVA_VERSION: ${{ inputs['java-version'] }}
          GRADLE_TASKS: ${{ inputs['gradle-tasks'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
          VERSION: ${{ steps.version-info.outputs.VERSION }}
        run: bash .github-shared/scripts/summary/write-gradle-build-summary.sh
