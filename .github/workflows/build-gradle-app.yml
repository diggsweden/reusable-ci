# Gradle Builder
# 
# Purpose: Builds Gradle projects (Android/JVM) and uploads artifacts for subsequent
# publishing steps. Separates build logic from registry-specific publishing.
#
# Build Process:
#   1. Set up JDK and Android SDK (if needed)
#   2. Run Gradle build tasks
#   3. Optional: Sign Android APK/AAB
#   4. Upload built artifacts
#
# Outputs:
#   - Artifacts uploaded with specified name (or 'gradle-build-artifacts' by default)
#
# Required Permissions:
#   contents: read  # Checkout code
#
name: Build Gradle
on:
  workflow_call:
    inputs:
      build-type:
        description: "Build type: app (application) or plugin (Gradle plugin)"
        required: false
        default: "app"
        type: string
      java-version:
        description: "Java version"
        required: true
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string
      gradle-tasks:
        description: "Gradle tasks to run"
        required: false
        default: "assemble"
        type: string
      build-module:
        description: "Gradle module to build"
        required: false
        default: "app"
        type: string
      enable-signing:
        description: "Enable Android app signing"
        required: false
        default: false
        type: boolean
      skip-tests:
        description: "Skip tests during build"
        required: false
        default: false
        type: boolean
      branch:
        description: "Branch to checkout"
        required: false
        default: "main"
        type: string
      artifact-name:
        description: "Artifact name for uploads (defaults to 'gradle-build-artifacts')"
        required: false
        default: ""
        type: string
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read
jobs:
  build-gradle:
    name: Build Gradle Project
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
      - name: Checkout .github repository for scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: ${{ inputs['java-version'] }}
          cache: 'gradle'
      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: Make gradlew executable
        working-directory: ${{ inputs['working-directory'] }}
        run: chmod +x ./gradlew
      - name: Decode Android keystore
        if: ${{ inputs['enable-signing'] }}
        working-directory: ${{ inputs['working-directory'] }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.keystore
            printf "ANDROID_KEYSTORE_PATH=%s/release.keystore\n" "$PWD" >> "$GITHUB_ENV"
            printf "✓ Android keystore decoded successfully\n"
          else
            printf "::error::ANDROID_KEYSTORE secret not found but enableSigning is true\n"
            exit 1
          fi
      - name: Get version info
        id: version-info
        working-directory: ${{ inputs['working-directory'] }}
        run: |
          if [ -f "gradle.properties" ]; then
            VERSION=$(grep "versionName=" gradle.properties | cut -d'=' -f2)
            VERSION_CODE=$(grep "versionCode=" gradle.properties | cut -d'=' -f2)
            printf "VERSION=%s\n" "${VERSION}" >> "$GITHUB_OUTPUT"
            printf "VERSION_CODE=%s\n" "${VERSION_CODE}" >> "$GITHUB_OUTPUT"
            printf "Version: %s (%s)\n" "${VERSION}" "${VERSION_CODE}"
          else
            printf "::warning::gradle.properties not found, version info unavailable\n"
          fi
      - name: Decode secrets properties
        working-directory: ${{ inputs['working-directory'] }}
        env:
          SECRETS_PROPERTIES: ${{ secrets.SECRETS_PROPERTIES_BASE64 }}
        run: |
          if [ -n "$SECRETS_PROPERTIES" ]; then
            printf "%s" "$SECRETS_PROPERTIES" | base64 -d > secrets.properties
          fi
      - name: Run Gradle build
        working-directory: ${{ inputs['working-directory'] }}
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GRADLE_TASKS: ${{ inputs['gradle-tasks'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
        run: |
          printf "Running Gradle tasks: %s\n" "$GRADLE_TASKS"
          # shellcheck disable=SC2086
          if [ "$SKIP_TESTS" = "true" ]; then
            ./gradlew $GRADLE_TASKS -x test
          else
            # shellcheck disable=SC2086
            ./gradlew $GRADLE_TASKS
          fi
      # Separate Gradle invocation keeps SBOM failures advisory (continue-on-error).
      # Injecting the plugin into the real build would make a signing/build regression
      # cascade from an SBOM-tool problem, which is the wrong failure domain.
      - name: Generate Build SBOM
        id: sbom
        continue-on-error: true
        working-directory: ${{ inputs['working-directory'] }}
        env:
          # renovate: datasource=maven depName=org.cyclonedx:cyclonedx-gradle-plugin
          CYCLONEDX_GRADLE_VERSION: "3.2.1"
        run: bash "${{ github.workspace }}/.github-shared/scripts/sbom/build/gradle/generate-gradle-sbom.sh"
      - name: List built artifacts
        working-directory: ${{ inputs['working-directory'] }}
        env:
          BUILD_MODULE: ${{ inputs['build-module'] }}
        run: |
          printf "Built artifacts:\n"
          find "$BUILD_MODULE"/build/outputs -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.jar" \) -ls || printf "No artifacts found\n"
      - name: Upload Gradle artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs['artifact-name'] || 'gradle-build-artifacts' }}
          path: |
            ${{ inputs['working-directory'] }}/${{ inputs['build-module'] }}/build/outputs/**/*.apk
            ${{ inputs['working-directory'] }}/${{ inputs['build-module'] }}/build/outputs/**/*.aab
            ${{ inputs['working-directory'] }}/${{ inputs['build-module'] }}/build/libs/*.jar
          retention-days: 7
          if-no-files-found: error
      # SBOM artifact is paired with the build artifact name so parallel
      # matrix uploads (release-build-stage dispatches build-gradle per
      # artifact) don't collide on a single fixed SBOM name. Default falls
      # back to `gradle-build-sbom` when `artifact-name` is not overridden.
      # cyclonedx-gradle-plugin 3.x writes to build/reports/bom.json;
      # build/reports/cyclonedx/bom.json is retained for older plugin versions.
      - name: Upload Gradle Build SBOM
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: ${{ inputs['artifact-name'] && format('{0}-sbom', inputs['artifact-name']) || 'gradle-build-sbom' }}
          path: |
            ${{ inputs['working-directory'] }}/build/reports/bom.json
            ${{ inputs['working-directory'] }}/**/build/reports/bom.json
            ${{ inputs['working-directory'] }}/build/reports/cyclonedx/bom.json
            ${{ inputs['working-directory'] }}/**/build/reports/cyclonedx/bom.json
          retention-days: 7
          if-no-files-found: warn
      - name: Write SBOM status to step summary
        if: always()
        env:
          SBOM_OUTCOME: ${{ steps.sbom.outcome }}
          WORKDIR: ${{ inputs['working-directory'] }}
        run: |
          # shellcheck disable=SC2016  # backticks inside single quotes are intentional markdown
          {
            printf '### Build SBOM\n'
            if [[ "$SBOM_OUTCOME" == "success" ]]; then
              # Report the shallowest bom.json relative to the working dir.
              bom=$(find "$WORKDIR" -path '*/build/reports/bom.json' -o -path '*/build/reports/cyclonedx/bom.json' 2>/dev/null | sort | head -1)
              if [[ -n "$bom" ]]; then
                printf -- '- ✅ CycloneDX: `%s`\n' "$bom"
              else
                printf -- '- ⚠️ Generated but file not located — check plugin output path\n'
              fi
            else
              printf -- '- ⚠️ Generation step did not succeed (continued as advisory)\n'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate build summary
        env:
          JAVA_VERSION: ${{ inputs['java-version'] }}
          BUILD_MODULE: ${{ inputs['build-module'] }}
          GRADLE_TASKS: ${{ inputs['gradle-tasks'] }}
          SKIP_TESTS: ${{ inputs['skip-tests'] }}
          ENABLE_SIGNING: ${{ inputs['enable-signing'] }}
          VERSION: ${{ steps.version-info.outputs.VERSION }}
          VERSION_CODE: ${{ steps.version-info.outputs.VERSION_CODE }}
        run: bash .github-shared/scripts/summary/write-gradle-build-summary.sh
