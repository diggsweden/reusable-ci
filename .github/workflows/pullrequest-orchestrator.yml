# Pull Request Orchestrator
# 
# Purpose: Orchestrates all quality checks for pull requests and pushes, ensuring
# code quality, security, and compliance before merging. Provides a configurable
# set of linters and security scanners that can be toggled per project needs.
#
# How it works:
# 1. Runs on every push to configured branches and on pull requests
# 2. Executes enabled linters in parallel for faster feedback
# 3. Performs security scanning (SAST, dependency checks, secret detection)
# 4. Validates licenses for compliance
# 5. Uploads results to GitHub Code Scanning for visibility
#
# Security controls:
# - Secret detection to prevent credential leaks
# - Dependency vulnerability scanning
# - License compliance validation
# - SAST (Static Application Security Testing)
# - Results uploaded to GitHub Code Scanning (requires SARIF_UPLOAD_TOKEN secret)
#
# Required Secrets:
#   None required - uses GITHUB_TOKEN for operations
#   Optional: SARIF_UPLOAD_TOKEN for uploading scan results to Code Scanning
#             (requires code_scanning_alerts:write — GitHub App or fine-grained PAT)
#   Optional: Organization secrets for private package access
#
# Required Permissions:
#   contents: read         # Read source code
#   packages: read         # Access private packages
#   secrets: inherit       # Pass SARIF_UPLOAD_TOKEN for Code Scanning upload
#
# Configurable Linters:
#   linters.commitlint: Commit message linting (default: true)
#   linters.licenselint: License compliance checking (default: true)
#   linters.dependencyreview: Dependency vulnerability scan (default: true)
#   linters.megalint: MegaLinter with 50+ linters (default: true)
#   linters.publiccodelint: Publiccode.yml validation (default: false)
#   linters.devbasecheck: devbase-check linting (default: false) - RECOMMENDED
name: Orchestrate Pull Request
on:
  workflow_call:
    inputs:
      # Project configuration
      project-type:
        description: "Project type: maven, npm, python"
        required: true
        type: string
      base-branch:
        description: "Base branch for commit linting (auto-detects PR target if empty)"
        required: false
        default: ""
        type: string
      # Linter toggles (all can be disabled if needed)
      linters.commitlint:
        description: "⚠️ DEPRECATED v3.0: Enable commit message linting (migrate to devbasecheck)"
        required: false
        default: true
        type: boolean
      linters.licenselint:
        description: "⚠️ DEPRECATED v3.0: Enable SPDX license header linting (migrate to devbasecheck)"
        required: false
        default: true
        type: boolean
      linters.dependencyreview:
        description: "Enable dependency vulnerability review"
        required: false
        default: true
        type: boolean
      linters.megalint:
        description: "⚠️ DEPRECATED v3.0: Enable MegaLinter (migrate to devbasecheck)"
        required: false
        default: true
        type: boolean
      linters.publiccodelint:
        description: "Enable publiccode.yml linting"
        required: false
        default: false
        type: boolean
      linters.devbasecheck:
        description: "✅ RECOMMENDED: Enable devbase-check linting (replaces megalint, commitlint, licenselint)"
        required: false
        default: false
        type: boolean
      linters.swiftformat:
        description: "Enable swift-format (Google Swift Style Guide) for iOS/macOS projects"
        required: false
        default: false
        type: boolean
      linters.swiftlint:
        description: "Enable SwiftLint (comprehensive linting rules) for iOS/macOS projects"
        required: false
        default: false
        type: boolean
      reusable-ci-ref:
        description: "Ref for reusable-ci helper scripts checkout (defaults to main)"
        required: false
        default: "main"
        type: string
permissions:
  contents: read # Best Security practice. Jobs only get read as base, and then permissions are added as needed
jobs:
  # ===== Stage 0: PR Interface =====
  compose-pr-interface:
    name: Setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr-context-json: ${{ steps.interface.outputs.pr-context-json }}
      pr-policy-json: ${{ steps.interface.outputs.pr-policy-json }}
    steps:
      - name: Checkout reusable-ci helper scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Compose PR control-plane interface
        id: interface
        env:
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          BASE_BRANCH: ${{ inputs['base-branch'] }}
          REUSABLE_CI_REF: ${{ inputs['reusable-ci-ref'] }}
          LINTER_COMMITLINT: ${{ inputs['linters.commitlint'] }}
          LINTER_LICENSLINT: ${{ inputs['linters.licenselint'] }}
          LINTER_DEPENDENCYREVIEW: ${{ inputs['linters.dependencyreview'] }}
          LINTER_MEGALINT: ${{ inputs['linters.megalint'] }}
          LINTER_PUBLICCODELINT: ${{ inputs['linters.publiccodelint'] }}
          LINTER_DEVBASECHECK: ${{ inputs['linters.devbasecheck'] }}
          LINTER_SWIFTFORMAT: ${{ inputs['linters.swiftformat'] }}
          LINTER_SWIFTLINT: ${{ inputs['linters.swiftlint'] }}
        run: bash .github-shared/scripts/plan/write-pr-interface.sh

  # ===== Stage 1: Quality =====
  execute-quality-stage:
    name: Quality
    needs: [compose-pr-interface]
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/pullrequest-quality-stage.yml
    with:
      pr-context-json: ${{ needs.compose-pr-interface.outputs.pr-context-json }}
      pr-policy-json: ${{ needs.compose-pr-interface.outputs.pr-policy-json }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}

  # ===== Summary =====
  pr-summary:
    name: PR Summary
    needs: [compose-pr-interface, execute-quality-stage]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Generate PR summary
        env:
          PROJECT_TYPE: ${{ inputs['project-type'] }}
          QUALITY_STAGE_RESULT_JSON: ${{ needs.execute-quality-stage.outputs.result-json }}
          HAS_SARIF_UPLOAD_TOKEN: ${{ secrets.SARIF_UPLOAD_TOKEN != '' }}
        run: bash .github-shared/scripts/summary/write-pr-summary.sh
