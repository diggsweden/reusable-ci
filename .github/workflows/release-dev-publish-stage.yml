name: Dev Release Publish Stage
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      dev-context-json:
        required: true
        type: string
      dev-policy-json:
        required: true
        type: string
      build-result-json:
        required: true
        type: string
      reusable-ci-ref:
        required: false
        default: "main"
        type: string
      sboms:
        required: false
        default: "none"
        type: string
      publish-container:
        required: false
        default: true
        type: boolean
    secrets:
      registry-password:
        required: false
    outputs:
      stage-ran:
        description: Dev publish stage ran
        value: ${{ jobs.summarize-dev-publish-stage.outputs.stage-ran }}
      stage-result:
        description: Normalized dev publish stage result
        value: ${{ jobs.summarize-dev-publish-stage.outputs.stage-result }}
      result-json:
        description: Dev publish stage result payload
        value: ${{ jobs.summarize-dev-publish-stage.outputs.result-json }}
      artifacts-json:
        description: Published dev artifact payload
        value: ${{ jobs.summarize-dev-publish-stage.outputs.artifacts-json }}
permissions:
  contents: read
jobs:
  build-dev-container:
    name: Build Container Dev
    # Build-stage is allowed to be 'skipped' for container-first
    # ecosystems (cargo): no artefact-first build runs, but the
    # container itself can still be built here.
    if: ${{ inputs['publish-container'] && (fromJson(inputs['build-result-json']).result == 'success' || fromJson(inputs['build-result-json']).result == 'skipped') }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/publish-dev-container.yml
    with:
      working-directory: ${{ fromJson(inputs['dev-context-json']).working_directory }}
      container-file: ${{ fromJson(inputs['dev-context-json']).container_file }}
      registry: ${{ fromJson(inputs['dev-context-json']).registry }}
      artifact-types: ${{ fromJson(inputs['dev-context-json']).project_type }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
  publish-npm-dev:
    name: Publish Dev NPM Package
    if: ${{ fromJson(inputs['dev-context-json']).project_type == 'npm' && fromJson(inputs['dev-policy-json']).publish_npm && fromJson(inputs['build-result-json']).targets.npm == 'success' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-dev-npm.yml
    with:
      working-directory: ${{ fromJson(inputs['dev-context-json']).working_directory }}
      node-version: ${{ fromJson(inputs['dev-context-json']).node_version }}
      registry: ${{ fromJson(inputs['dev-context-json']).npm_registry }}
      package-scope: ${{ fromJson(inputs['dev-context-json']).package_scope }}
      registry-username: ${{ fromJson(inputs['dev-context-json']).npm_registry_username }}
      use-ci-token: ${{ fromJson(inputs['dev-policy-json']).use_ci_token }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
    secrets:
      registry-password: ${{ secrets.registry-password }}
  # Cargo's lockfile-derived "build" SBOM. container-first means cargo has
  # no build-stage; the SBOM and its corresponding container ship together,
  # so the SBOM lives in publish-stage alongside the container build.
  # Mirrors release-publish-stage.yml's `sbom-cargo` shape but without the
  # cargo-artifacts matrix (dev runs single-project, not multi-cargo).
  # Gated on sboms != 'none' so dev's default fast path doesn't pay for
  # SBOM generation it won't consume.
  sbom-cargo-dev:
    name: Cargo SBOM Dev
    if: ${{ fromJson(inputs['dev-context-json']).project_type == 'cargo' && inputs.sboms != 'none' }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/sbom-cargo.yml
    with:
      working-directory: ${{ fromJson(inputs['dev-context-json']).working_directory }}
      branch: ${{ fromJson(inputs['dev-context-json']).branch }}
      rust-toolchain: ${{ fromJson(inputs['dev-context-json']).rust_toolchain || 'stable' }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
  generate-dev-sboms:
    name: Generate Dev SBOMs
    needs: [sbom-cargo-dev]
    # Wait for cargo's build SBOM (when applicable) to upload before
    # downloading and aggregating. needs[].result == 'skipped' means the
    # cargo job was gated off (non-cargo project or sboms=none); that's
    # fine — generate-dev-sboms then aggregates whatever artefact-first
    # builders produced.
    if: ${{ inputs.sboms != 'none' && (fromJson(inputs['build-result-json']).result == 'success' || fromJson(inputs['build-result-json']).result == 'skipped') && !cancelled() && needs.sbom-cargo-dev.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      # Resolve upload names via the same script prod uses
      # (release-create-github.yml). Single source of truth for
      # ecosystem -> upload-name mapping; new ecosystems extend
      # resolve-artifact-name.sh and dev/prod both pick them up.
      - name: Determine artefact upload names
        id: artefact-names
        env:
          PROJECT_TYPE: ${{ fromJson(inputs['dev-context-json']).project_type }}
        run: bash .github-shared/scripts/release/resolve-artifact-name.sh "$PROJECT_TYPE" >> "$GITHUB_OUTPUT"
      # Download by exact name (mirrors prod). Avoids pulling
      # multi-arch noise (per-arch digests, .dockerbuild auto-uploads,
      # per-arch container SBOMs) that an unfiltered download would
      # try to pull.
      - name: Download build artefact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        continue-on-error: true
        with:
          name: ${{ steps.artefact-names.outputs.name }}
          path: ./release-artifacts
      # Skip the second download for cargo (name == sbom-name) and
      # when the build layer wasn't requested.
      - name: Download Build SBOM
        if: ${{ (contains(inputs.sboms, 'build') || inputs.sboms == 'all') && steps.artefact-names.outputs.sbom-name != steps.artefact-names.outputs.name }}
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        continue-on-error: true
        with:
          name: ${{ steps.artefact-names.outputs.sbom-name }}
          path: ./release-artifacts
      - name: Generate CISA-layer SBOMs (dev)
        env:
          PROJECT_TYPE: ${{ fromJson(inputs['dev-context-json']).project_type }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          DEV_VERSION: dev-${{ github.sha }}
          SBOMS: ${{ inputs.sboms }}
        run: |
          # analyzed-container is scanned at container-publish time, not here —
          # feed generate-sboms.sh only the artifact-level layers.
          layers=$(bash .github-shared/scripts/config/expand-sboms.sh \
            --format comma --exclude analyzed-container "$SBOMS")
          if [[ -n "$layers" ]]; then
            bash .github-shared/scripts/sbom/generate-sboms.sh \
              --project-type "$PROJECT_TYPE" \
              --layers "$layers" \
              --version "$DEV_VERSION" \
              --name "$PROJECT_NAME"
          else
            printf "No artifact-level SBOM layers requested (sboms=%s).\n" "$SBOMS"
          fi
      - name: Upload Dev SBOMs
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: dev-sboms-${{ github.run_id }}
          path: |
            *-sbom.cyclonedx.json
            *-sbom.spdx.json
          retention-days: 7
          if-no-files-found: warn
  summarize-dev-publish-stage:
    name: Summarize Dev Publish Stage
    needs: [build-dev-container, publish-npm-dev, sbom-cargo-dev, generate-dev-sboms]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      stage-ran: ${{ steps.summary.outputs.stage-ran }}
      stage-result: ${{ steps.summary.outputs.stage-result }}
      result-json: ${{ steps.summary.outputs.result-json }}
      artifacts-json: ${{ steps.summary.outputs.artifacts-json }}
    steps:
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Normalize dev publish stage result
        id: summary
        env:
          PROJECT_TYPE: ${{ fromJson(inputs['dev-context-json']).project_type }}
          PUBLISH_NPM: ${{ fromJson(inputs['dev-policy-json']).publish_npm }}
          BUILD_DEV_CONTAINER_RESULT: ${{ needs.build-dev-container.result }}
          PUBLISH_NPM_DEV_RESULT: ${{ needs.publish-npm-dev.result }}
          CARGO_SBOM_DEV_RESULT: ${{ needs.sbom-cargo-dev.result }}
          GENERATE_DEV_SBOMS_RESULT: ${{ needs.generate-dev-sboms.result }}
          CONTAINER_IMAGE: ${{ needs.build-dev-container.outputs.image }}
          CONTAINER_DIGEST: ${{ needs.build-dev-container.outputs.digest }}
          NPM_PACKAGE_NAME: ${{ needs.publish-npm-dev.outputs.package-name }}
          NPM_PACKAGE_VERSION: ${{ needs.publish-npm-dev.outputs.package-version }}
          NPM_PUBLISH_STATUS: ${{ needs.publish-npm-dev.outputs.publish-status }}
        run: bash .github-shared/scripts/summary/write-dev-publish-stage-result.sh
