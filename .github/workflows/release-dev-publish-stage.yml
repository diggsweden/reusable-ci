name: Dev Release Publish Stage
on:
  workflow_call: # yamllint disable-line rule:truthy
    inputs:
      dev-context-json:
        required: true
        type: string
      dev-policy-json:
        required: true
        type: string
      build-result-json:
        required: true
        type: string
      reusable-ci-ref:
        required: false
        default: "main"
        type: string
      sboms:
        required: false
        default: "none"
        type: string
      publish-container:
        required: false
        default: true
        type: boolean
    secrets:
      registry-password:
        required: false
    outputs:
      stage-ran:
        description: Dev publish stage ran
        value: ${{ jobs.summarize-dev-publish-stage.outputs.stage-ran }}
      stage-result:
        description: Normalized dev publish stage result
        value: ${{ jobs.summarize-dev-publish-stage.outputs.stage-result }}
      result-json:
        description: Dev publish stage result payload
        value: ${{ jobs.summarize-dev-publish-stage.outputs.result-json }}
      artifacts-json:
        description: Published dev artifact payload
        value: ${{ jobs.summarize-dev-publish-stage.outputs.artifacts-json }}
permissions:
  contents: read
jobs:
  build-dev-container:
    name: Build Container Dev
    if: ${{ inputs['publish-container'] && fromJson(inputs['build-result-json']).result == 'success' }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
    uses: ./.github/workflows/publish-dev-container.yml
    with:
      working-directory: ${{ fromJson(inputs['dev-context-json']).working_directory }}
      container-file: ${{ fromJson(inputs['dev-context-json']).container_file }}
      registry: ${{ fromJson(inputs['dev-context-json']).registry }}
      artifact-types: ${{ fromJson(inputs['dev-context-json']).project_type }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
  publish-npm-dev:
    name: Publish Dev NPM Package
    if: ${{ fromJson(inputs['dev-context-json']).project_type == 'npm' && fromJson(inputs['dev-policy-json']).publish_npm && fromJson(inputs['build-result-json']).targets.npm == 'success' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-dev-npm.yml
    with:
      working-directory: ${{ fromJson(inputs['dev-context-json']).working_directory }}
      node-version: ${{ fromJson(inputs['dev-context-json']).node_version }}
      registry: ${{ fromJson(inputs['dev-context-json']).npm_registry }}
      package-scope: ${{ fromJson(inputs['dev-context-json']).package_scope }}
      registry-username: ${{ fromJson(inputs['dev-context-json']).npm_registry_username }}
      use-ci-token: ${{ fromJson(inputs['dev-policy-json']).use_ci_token }}
      reusable-ci-ref: ${{ inputs['reusable-ci-ref'] }}
    secrets:
      registry-password: ${{ secrets.registry-password }}
  generate-dev-sboms:
    name: Generate Dev SBOMs
    if: ${{ inputs.sboms != 'none' && fromJson(inputs['build-result-json']).result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./release-artifacts
          merge-multiple: true
      - name: Generate CISA-layer SBOMs (dev)
        env:
          PROJECT_TYPE: ${{ fromJson(inputs['dev-context-json']).project_type }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          DEV_VERSION: dev-${{ github.sha }}
          SBOMS: ${{ inputs.sboms }}
        run: |
          # analyzed-container is scanned at container-publish time, not here —
          # feed generate-sboms.sh only the artifact-level layers.
          layers=$(bash .github-shared/scripts/config/expand-sboms.sh \
            --format comma --exclude analyzed-container "$SBOMS")
          if [[ -n "$layers" ]]; then
            bash .github-shared/scripts/sbom/generate-sboms.sh \
              --project-type "$PROJECT_TYPE" \
              --layers "$layers" \
              --version "$DEV_VERSION" \
              --name "$PROJECT_NAME"
          else
            printf "No artifact-level SBOM layers requested (sboms=%s).\n" "$SBOMS"
          fi
      - name: Upload Dev SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dev-sboms-${{ github.run_id }}
          path: |
            *-sbom.cyclonedx.json
            *-sbom.spdx.json
          retention-days: 7
          if-no-files-found: warn
  summarize-dev-publish-stage:
    name: Summarize Dev Publish Stage
    needs: [build-dev-container, publish-npm-dev, generate-dev-sboms]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      stage-ran: ${{ steps.summary.outputs.stage-ran }}
      stage-result: ${{ steps.summary.outputs.stage-result }}
      result-json: ${{ steps.summary.outputs.result-json }}
      artifacts-json: ${{ steps.summary.outputs.artifacts-json }}
    steps:
      - name: Checkout reusable-ci scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: diggsweden/reusable-ci
          ref: ${{ inputs['reusable-ci-ref'] }}
          path: .github-shared
          sparse-checkout: scripts
      - name: Normalize dev publish stage result
        id: summary
        env:
          PROJECT_TYPE: ${{ fromJson(inputs['dev-context-json']).project_type }}
          PUBLISH_NPM: ${{ fromJson(inputs['dev-policy-json']).publish_npm }}
          BUILD_DEV_CONTAINER_RESULT: ${{ needs.build-dev-container.result }}
          PUBLISH_NPM_DEV_RESULT: ${{ needs.publish-npm-dev.result }}
          GENERATE_DEV_SBOMS_RESULT: ${{ needs.generate-dev-sboms.result }}
          CONTAINER_IMAGE: ${{ needs.build-dev-container.outputs.image }}
          CONTAINER_DIGEST: ${{ needs.build-dev-container.outputs.digest }}
          NPM_PACKAGE_NAME: ${{ needs.publish-npm-dev.outputs.package-name }}
          NPM_PACKAGE_VERSION: ${{ needs.publish-npm-dev.outputs.package-version }}
          NPM_PUBLISH_STATUS: ${{ needs.publish-npm-dev.outputs.publish-status }}
        run: bash .github-shared/scripts/summary/write-dev-publish-stage-result.sh
